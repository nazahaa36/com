<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>نزاهة - NA-Space | المنصة المهنية المتكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Noto+Kufi+Arabic:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', 'Noto Kufi Arabic', sans-serif; }
        :root {
            --primary-green: #2ecc71;
            --accent-red: #e74c3c;
            --ios-bg: #f5f7fa;
            --glass-bg: rgba(255, 255, 255, 0.96);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-main: #1e2a3a;
            --tab-bar-bg: #ffffff;
        }
        body.dark {
            --ios-bg: #121212;
            --glass-bg: #1e1e2a;
            --text-main: #eef2ff;
            --glass-border: rgba(255,255,255,0.1);
            --tab-bar-bg: #1e1e2a;
        }
        body { background: var(--ios-bg); color: var(--text-main); transition: 0.3s; }
        .loading-screen {
            position: fixed; top:0; left:0; width:100%; height:100%; background: var(--ios-bg); z-index: 10000;
            display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 20px;
            transition: 0.5s;
        }
        .loading-screen.hide { opacity: 0; visibility: hidden; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(46,204,113,0.2); border-top: 5px solid var(--primary-green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f3b2c, #1a5f3a);
            padding: 20px;
        }
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .login-logo { width: 80px; height: 80px; margin: 0 auto 20px; background: var(--primary-green); border-radius: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .animated-text { font-size: 24px; font-weight: 800; margin: 20px 0; min-height: 80px; color: var(--primary-green); }
        .form-input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 30px; border: 1px solid var(--glass-border); background: var(--glass-bg); font-size: 16px; color: var(--text-main); }
        .btn-submit { background: var(--primary-green); color: white; padding: 14px; border: none; border-radius: 30px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .dashboard-container { display: none; max-width: 800px; margin: 0 auto; padding: 80px 16px 80px; }
        .app-header {
            position: fixed; top:0; left:0; right:0; background: var(--glass-bg); backdrop-filter: blur(20px);
            padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }
        .logout-btn { background: var(--accent-red); color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; }
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--tab-bar-bg);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 12px 20px;
            border-top: 1px solid var(--glass-border);
            z-index: 1000;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
            font-size: 10px;
            font-weight: 600;
        }
        .tab-item i { font-size: 22px; }
        .tab-item.active { opacity: 1; color: var(--primary-green); }
        .tab-pane { display: none; animation: fadeIn 0.3s; }
        .tab-pane.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .card-glass {
            background: var(--glass-bg);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
        }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .info-label { font-weight: 600; opacity: 0.7; }
        .badge-employee { background: #f39c12; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .badge-member { background: var(--primary-green); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background: #ccc; margin-bottom: 10px; cursor: pointer; border: 2px solid var(--primary-green); }
        .barcode-container { background: white; padding: 10px; border-radius: 16px; text-align: center; margin-top: 15px; direction: ltr; }
        .btn-icon { background: rgba(46,204,113,0.15); border: none; padding: 10px 16px; border-radius: 30px; cursor: pointer; transition: 0.2s; margin: 5px; font-size: 14px; }
        .btn-icon:hover { background: var(--primary-green); color: white; }
        .flex-buttons { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px; }
        .initiative-item, .task-item { background: rgba(46,204,113,0.1); border-radius: 20px; padding: 12px; margin-bottom: 12px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .stat-card { background: rgba(0,0,0,0.05); border-radius: 20px; padding: 12px; text-align: center; }
        .stat-number { font-size: 28px; font-weight: 800; color: var(--primary-green); }
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            z-index: 10001; display: none; align-items: center; justify-content: center; padding:20px;
        }
        .modal-container { background: var(--glass-bg); border-radius: 32px; max-width: 550px; width:100%; max-height: 80vh; overflow-y: auto; padding: 24px; position: relative; }
        .modal-close { position: absolute; top: 12px; left: 12px; background: var(--accent-red); border: none; width: 32px; height: 32px; border-radius: 50%; color: white; cursor: pointer; }
        canvas#activityChart, canvas#recordsChart { max-height: 200px; margin-top: 15px; }
        .stars { display: inline-flex; gap: 5px; direction: ltr; }
        .stars i { font-size: 24px; color: #ffc107; cursor: pointer; }
        @media (max-width: 768px) { .dashboard-container { padding-top: 70px; padding-bottom: 70px; } }
        .hidden { display: none !important; }
        .space-post { border-bottom: 1px solid var(--glass-border); padding: 12px 0; }
    </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen"><div class="spinner"></div><div style="color:var(--primary-green);">جاري تحميل NA-Space...</div></div>

<div id="loginContainer" class="login-container">
    <div class="login-card">
        <div class="login-logo"><img src="logo.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Crect width=%27100%27 height=%27100%27 rx=%2722%27 fill=%27%232ecc71%27/%3E%3Ctext x=%2750%27 y=%2768%27 font-size=%2750%27 text-anchor=%27middle%27 fill=%27white%27%3Eن%3C/text%3E%3C/svg%3E'"></div>
        <div class="animated-text" id="loginAnimatedText">NA-Space</div>
        <input type="text" id="loginId" class="form-input" placeholder="رقم التعريف" autocomplete="off">
        <input type="password" id="loginPass" class="form-input" placeholder="كلمة السر">
        <button class="btn-submit" onclick="performLogin()">دخول</button>
    </div>
</div>

<div id="dashboardContainer" class="dashboard-container">
    <div class="app-header">
        <div class="logo"><img src="logo.png" style="width:40px;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Crect width=%27100%27 height=%27100%27 rx=%2722%27 fill=%27%232ecc71%27/%3E%3Ctext x=%2750%27 y=%2768%27 font-size=%2750%27 text-anchor=%27middle%27 fill=%27white%27%3Eن%3C/text%3E%3C/svg%3E'"><span style="font-weight:800;">نزاهة - NA-Space</span></div>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>
    <div class="tab-bar">
        <div class="tab-item active" data-tab="home"><i class="fas fa-home"></i><span>الرئيسية</span></div>
        <div class="tab-item" data-tab="services"><i class="fas fa-folder-open"></i><span>الخدمات</span></div>
        <div class="tab-item" data-tab="records"><i class="fas fa-history"></i><span>السجل</span></div>
        <div class="tab-item" data-tab="space"><i class="fas fa-feather-alt"></i><span>مساحة حرة</span></div>
        <div class="tab-item" data-tab="profile"><i class="fas fa-user"></i><span>ملفي الشخصي</span></div>
    </div>

    <div id="homeTab" class="tab-pane active"><div id="homeContent" class="card-glass"></div></div>
    <div id="servicesTab" class="tab-pane"><div class="card-glass" id="servicesContent"></div></div>
    <div id="recordsTab" class="tab-pane"><div id="recordsContent" class="card-glass"></div></div>
    <div id="spaceTab" class="tab-pane"><div id="spaceContent" class="card-glass"></div></div>
    <div id="profileTab" class="tab-pane"><div id="profileContent" class="card-glass"></div></div>
</div>

<div id="serviceModal" class="modal-overlay"><div class="modal-container"><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button><h3 id="modalTitle"></h3><div id="modalBody"></div></div></div>

<script>
    // ======================== الروابط الخارجية ========================
    const MEMBER_URL = "https://raw.githubusercontent.com/nazahaa36/com/main/member.json";
    const INITIATIVES_URL = "https://raw.githubusercontent.com/nazahaa36/com/main/initiatives.json";
    
    let membersList = [];
    let currentUser = null;
    let chartRecords = null;
    let spacePosts = []; // منشورات المساحة الحرة
    
    function showToast(msg, type='info') { let t=document.createElement('div'); t.className=`toast ${type}`; t.innerHTML=`<i class="fas ${type==='success'?'fa-check-circle':type==='error'?'fa-exclamation-triangle':'fa-info-circle'}"></i> ${msg}`; t.style.cssText='position:fixed; bottom:20px; right:20px; left:20px; max-width:400px; background:rgba(0,0,0,0.85); color:white; padding:12px 16px; border-radius:18px; z-index:10002; backdrop-filter:blur(10px);'; document.body.appendChild(t); setTimeout(()=>t.remove(),4000); }
    function escapeHtml(str) { return str ? String(str).replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' })[m]) : ''; }
    
    // إرسال بريد مؤسساتي طويل
    function sendFormalEmail(subject, bodyPlain, attachmentBlobUrl = null) {
        let emailBody = `بسم الله الرحمن الرحيم\n\n${bodyPlain}\n\n-- \nهذه رسالة رسمية من منصة نزاهة - NA-Space\nتاريخ الإرسال: ${new Date().toLocaleString('ar-EG')}\nالمرسل: ${currentUser?.fullName} (${currentUser?.id})\nنوع المستخدم: ${currentUser?.type === 'employee' ? 'موظف' : 'عضو'}\nيرجى التعامل مع الطلب وفق الأنظمة المعمول بها.\n\nمع خالص الاحترام،\n${currentUser?.fullName}`;
        if(attachmentBlobUrl) emailBody += `\n\nملاحظة: تم إرفاق ملف بالطلب: ${attachmentBlobUrl}`;
        window.location.href = `mailto:nazahaa36.inf@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(emailBody)}`;
        showToast('تم فتح البريد الإلكتروني لإرسال الطلب', 'success');
    }
    
    // تحميل بطاقة العضوية PNG (للعضو)
    async function downloadMemberCardPNG() {
        if(!currentUser) return;
        const cardDiv = document.createElement('div');
        cardDiv.style.cssText = 'direction:rtl; background:linear-gradient(145deg,#ffffff,#f0f2f5); padding:25px; border-radius:32px; width:550px; margin:auto; font-family:sans-serif; box-shadow:0 20px 35px rgba(0,0,0,0.2); border:1px solid #2ecc71;';
        const now = new Date().toLocaleDateString('ar-EG');
        cardDiv.innerHTML = `
            <div style="text-align:center; border-bottom:2px solid #2ecc71; padding-bottom:10px;"><img src="logo.png" style="width:70px;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Crect width=%27100%27 height=%27100%27 rx=%2722%27 fill=%27%232ecc71%27/%3E%3Ctext x=%2750%27 y=%2768%27 font-size=%2750%27 text-anchor=%27middle%27 fill=%27white%27%3Eن%3C/text%3E%3C/svg%3E'"><h2 style="color:#2ecc71;">المنتدى الشبابي للفكر والمشاركة المدنية</h2><h3>بطاقة عضوية رسمية</h3></div>
            <div style="display:flex; gap:20px; margin:20px 0;"><div style="flex:1; text-align:center;"><img src="${currentUser.profileImage || 'data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ccircle cx=%2750%27 cy=%2750%27 r=%2745%27 fill=%27%23ccc%27/%3E%3Ctext x=%2750%27 y=%2765%27 text-anchor=%27middle%27 fill=%27white%27 font-size=%2740%27%3E👤%3C/text%3E%3C/svg%3E'}" style="width:110px; height:110px; border-radius:50%; border:3px solid #2ecc71; object-fit:cover;"></div><div style="flex:2;"><div><strong>الاسم الكامل:</strong> ${escapeHtml(currentUser.fullName)}</div><div><strong>رقم التعريف:</strong> ${currentUser.id}</div><div><strong>تاريخ التسجيل:</strong> ${currentUser.hiringDate || 'غير محدد'}</div><div><strong>تاريخ الانتهاء:</strong> ${currentUser.expiryDate || 'غير محدد'}</div><div><strong>الاهتمامات:</strong> ${escapeHtml(currentUser.interests || 'عام')}</div><div><strong>المؤسسات الشبابية:</strong> ${escapeHtml(currentUser.youthOrg || 'لا يوجد')}</div><div><strong>تاريخ الإصدار:</strong> ${now}</div></div></div>
            <div style="text-align:center; border-top:1px solid #ddd; padding-top:15px;"><div id="tempBarcodeCard"></div><p style="font-size:12px;">بطاقة عضوية معتمدة - نزاهة</p></div>
        `;
        document.body.appendChild(cardDiv);
        const canvasBc = document.createElement('canvas');
        cardDiv.querySelector('#tempBarcodeCard').appendChild(canvasBc);
        JsBarcode(canvasBc, currentUser.id, { format: "CODE128", width: 2, height: 45, displayValue: true });
        await new Promise(r => setTimeout(r, 100));
        html2canvas(cardDiv, { scale: 3, backgroundColor: '#ffffff' }).then(canvas => {
            const link = document.createElement('a');
            link.download = `nazaha_member_card_${currentUser.id}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            document.body.removeChild(cardDiv);
            showToast('تم تحميل بطاقة العضوية PNG بنجاح', 'success');
        }).catch(() => { document.body.removeChild(cardDiv); showToast('خطأ في التحميل', 'error'); });
    }
    
    // تحميل شهادة التوظيف PDF (للموظف)
    function downloadEmploymentCertificate() {
        if(!currentUser) return;
        const body = `السيد مدير الموارد البشرية المحترم،\n\nأطلب الحصول على شهادة توظيف رسمية (PDF) معتمدة بختم المنتدى، تشمل البيانات التالية:\n- الاسم الكامل: ${currentUser.fullName}\n- رقم التعريف: ${currentUser.id}\n- الخلية: ${currentUser.cell || 'غير محدد'}\n- المنصب: ${currentUser.position || 'غير محدد'}\n- تاريخ الالتحاق: ${currentUser.hiringDate || 'غير محدد'}\n\nعلماً بأن الشهادة مطلوبة لإتمام معاملات رسمية.\n\nمع خالص الاحترام،\n${currentUser.fullName}`;
        sendFormalEmail(`طلب شهادة توظيف - ${currentUser.id}`, body);
    }
    
    // رفع التقرير PDF (للموظف فقط)
    function uploadReportAsPDF() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.pdf';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if(file && file.type === 'application/pdf') {
                const blobUrl = URL.createObjectURL(file);
                const body = `السيد مدير المنتدى المحترم،\n\nأتقدم بتقريري الدوري للفترة الحالية، ويتضمن المرفق تفاصيل المهام والإنجازات والمؤشرات. علماً بأن التقرير معتمد ويحتوي على البيانات المطلوبة وفق النموذج المعتمد.\n\nمع خالص الاحترام،\n${currentUser.fullName}\n${currentUser.id}`;
                sendFormalEmail(`تقرير رسمي من ${currentUser.fullName}`, body, blobUrl);
                setTimeout(() => URL.revokeObjectURL(blobUrl), 600000);
            } else showToast('الرجاء اختيار ملف PDF صالح', 'error');
        };
        input.click();
    }
    
    // جلب البيانات
    async function fetchMembers() {
        try {
            const res = await fetch(MEMBER_URL);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            membersList = await res.json();
            if (!Array.isArray(membersList) || membersList.length === 0) throw new Error('ملف فارغ');
            return true;
        } catch(e) { console.error(e); showToast('خطأ في تحميل بيانات الأعضاء', 'error'); return false; }
    }
    
    async function fetchInitiatives() {
        try {
            const res = await fetch(INITIATIVES_URL);
            if (!res.ok) throw new Error();
            return await res.json();
        } catch(e) { return [ { title: "مبادرة التمكين الرقمي", description: "دورة تدريبية مجانية في البرمجة", date: "2025-05-10", link: "#" }, { title: "حملة تشجير", description: "زراعة 500 شجرة", date: "2025-04-25", link: "#" } ]; }
    }
    
    // إضافة نشاط/مهمة جديدة
    function addNewRecord() {
        const isEmployee = currentUser.type === 'employee';
        const title = prompt(isEmployee ? 'أدخل عنوان المهمة الجديدة:' : 'أدخل عنوان النشاط الجديد:');
        if(!title) return;
        const details = prompt('تفاصيل إضافية (اختياري):') || '';
        const newRecord = isEmployee ? { title, details, date: new Date().toLocaleDateString('ar-EG'), completed: false } : { action: title, details, date: new Date().toLocaleDateString('ar-EG') };
        if(isEmployee) { if(!currentUser.tasks) currentUser.tasks = []; currentUser.tasks.push(newRecord); if(!currentUser.performanceStats) currentUser.performanceStats = { tasksLastWeek: [2,3,4,5,6,5,4], efficiency: 85 }; currentUser.performanceStats.tasksLastWeek[6] += 1; currentUser.performanceStats.efficiency = Math.min(100, currentUser.performanceStats.efficiency + 2); }
        else { if(!currentUser.activityLog) currentUser.activityLog = []; currentUser.activityLog.push(newRecord); if(!currentUser.activityData) currentUser.activityData = [3,5,2,8,4,6,7]; currentUser.activityData[6] = Math.min(10, currentUser.activityData[6] + 1); }
        localStorage.setItem('nazaha_user', JSON.stringify(currentUser));
        renderAllTabs();
        showToast('تمت الإضافة بنجاح', 'success');
    }
    
    // المشاركة في مسابقة
    function participateInContest() {
        const contestName = prompt('اسم المسابقة:');
        if(!contestName) return;
        const contestLink = prompt('رابط الإعلان عن المسابقة:');
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = '.pdf,.png';
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            const blobUrl = file ? URL.createObjectURL(file) : null;
            const body = `السيد مدير المنتدى المحترم،\n\nأرغب في المشاركة في المسابقة التالية:\n- اسم المسابقة: ${contestName}\n- رابط الإعلان: ${contestLink || 'غير متوفر'}\n- الملف المرفق: ${file ? file.name : 'لا يوجد ملف'}\n\nأرجو قبول مشاركتي.\n\nمع خالص الاحترام،\n${currentUser.fullName}`;
            sendFormalEmail(`مشاركة في مسابقة - ${currentUser.id}`, body, blobUrl);
            if(blobUrl) setTimeout(() => URL.revokeObjectURL(blobUrl), 600000);
        };
        fileInput.click();
    }
    
    // المساحة الحرة - نشر كتاب/مقال/ملف
    function openFreeSpace() {
        const type = prompt('ماذا تريد نشر؟ (كتاب / مقال / ملف عمل)');
        if(!type) return;
        const title = prompt('العنوان:');
        if(!title) return;
        const content = prompt('المحتوى أو الوصف:');
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            const post = { id: Date.now(), type, title, content, date: new Date().toLocaleDateString('ar-EG'), author: currentUser.fullName, file: file ? file.name : null };
            spacePosts.unshift(post);
            renderFreeSpace();
            showToast('تم نشر مشاركتك بنجاح في المساحة الحرة', 'success');
            if(file) sendFormalEmail(`نشر في المساحة الحرة - ${currentUser.id}`, `العنوان: ${title}\nالنوع: ${type}\nالمحتوى: ${content}\nالملف: ${file.name}`);
            else sendFormalEmail(`نشر في المساحة الحرة - ${currentUser.id}`, `العنوان: ${title}\nالنوع: ${type}\nالمحتوى: ${content}`);
        };
        fileInput.click();
    }
    
    function renderFreeSpace() {
        const container = document.getElementById('spaceContent');
        let html = `<div class="flex-buttons"><button class="btn-icon" onclick="openFreeSpace()"><i class="fas fa-plus-circle"></i> نشر كتاب/مقال/ملف</button></div><hr>`;
        if(spacePosts.length === 0) html += `<p>لا توجد منشورات بعد. كن أول من يشارك!</p>`;
        else spacePosts.forEach(post => {
            html += `<div class="space-post"><strong>📚 ${escapeHtml(post.type)}:</strong> ${escapeHtml(post.title)}<br><small>بواسطة ${escapeHtml(post.author)} | ${post.date}</small><p>${escapeHtml(post.content)}</p>${post.file ? `<small>📎 ملف: ${escapeHtml(post.file)}</small>` : ''}</div>`;
        });
        container.innerHTML = html;
    }
    
    // عرض كل التبويبات
    async function renderAllTabs() {
        if(!currentUser) return;
        const isEmployee = currentUser.type === 'employee';
        
        // الرئيسية
        const homeDiv = document.getElementById('homeContent');
        if(isEmployee) {
            const stats = currentUser.performanceStats || { efficiency: 85, tasksLastWeek: [2,3,4,5,6,5,4] };
            const tasksCount = currentUser.tasks?.length || 0;
            const completed = currentUser.tasks?.filter(t=>t.completed).length || 0;
            homeDiv.innerHTML = `<h3><i class="fas fa-chart-line"></i> لوحة تحكم الموظف</h3><div class="stats-grid"><div class="stat-card"><div class="stat-number">${tasksCount}</div><div>إجمالي المهام</div></div><div class="stat-card"><div class="stat-number">${completed}</div><div>مهام منجزة</div></div><div class="stat-card"><div class="stat-number">${stats.efficiency}%</div><div>كفاءة الأداء</div></div></div><canvas id="empHomeChart" style="max-height:180px;"></canvas><div class="flex-buttons"><button class="btn-icon" onclick="addNewRecord()"><i class="fas fa-plus"></i> إضافة مهمة جديدة</button></div>`;
            const ctx = document.getElementById('empHomeChart')?.getContext('2d');
            if(ctx) new Chart(ctx, { type: 'line', data: { labels: ['أسبوع1','أسبوع2','أسبوع3','أسبوع4','أسبوع5','أسبوع6','أسبوع7'], datasets: [{ label: 'المهام المنجزة', data: stats.tasksLastWeek, borderColor: '#f39c12', fill: false }] } });
        } else {
            const initiatives = await fetchInitiatives();
            let html = `<h3><i class="fas fa-bullhorn"></i> المبادرات والفعاليات القادمة</h3>`;
            initiatives.forEach(init => { html += `<div class="initiative-item"><h4>${escapeHtml(init.title)}</h4><p>${escapeHtml(init.description)}</p><small>${init.date} | <a href="${init.link}" target="_blank">التفاصيل</a></small></div>`; });
            homeDiv.innerHTML = html;
        }
        
        // الخدمات (مشتركة + خاصة)
        const servicesDiv = document.getElementById('servicesContent');
        let servicesHtml = `<div class="section-title" style="font-weight:800;"><i class="fas fa-tools"></i> الخدمات المشتركة</div><div class="flex-buttons">`;
        servicesHtml += `<button class="btn-icon" onclick="openIdeaModal()"><i class="fas fa-lightbulb"></i> إقترح الآن</button>`;
        servicesHtml += `<button class="btn-icon" onclick="openRatingModal()"><i class="fas fa-star"></i> تقييم المنتدى</button>`;
        servicesHtml += `<button class="btn-icon" onclick="renewMembership()"><i class="fas fa-sync-alt"></i> تجديد العهدة</button>`;
        servicesHtml += `<button class="btn-icon" onclick="openUpdateDataModal()"><i class="fas fa-edit"></i> تعديل البيانات</button>`;
        servicesHtml += `<button class="btn-icon" onclick="participateInContest()"><i class="fas fa-trophy"></i> المشاركة في مسابقة</button>`;
        servicesHtml += `<button class="btn-icon" onclick="openDonationModal()"><i class="fas fa-hand-holding-heart"></i> التبرع</button>`;
        servicesHtml += `<button class="btn-icon" onclick="changePasswordRequest()"><i class="fas fa-key"></i> طلب تغيير كلمة السر</button>`;
        servicesHtml += `</div>`;
        
        if(isEmployee) {
            servicesHtml += `<hr><div class="section-title">الخدمات الخاصة بالموظف</div><div class="flex-buttons">`;
            servicesHtml += `<button class="btn-icon" onclick="downloadEmploymentCertificate()"><i class="fas fa-certificate"></i> تحميل شهادة التوظيف</button>`;
            servicesHtml += `<button class="btn-icon" onclick="uploadReportAsPDF()"><i class="fas fa-file-pdf"></i> رفع التقارير (PDF)</button>`;
            servicesHtml += `<button class="btn-icon" onclick="requestTransfer()"><i class="fas fa-exchange-alt"></i> طلب تحويل الخلية</button>`;
            servicesHtml += `<button class="btn-icon" onclick="resignEmployee()"><i class="fas fa-sign-out-alt"></i> طلب الاستقالة</button>`;
            servicesHtml += `</div>`;
        } else {
            servicesHtml += `<hr><div class="section-title">الخدمات الخاصة بالعضو</div><div class="flex-buttons">`;
            servicesHtml += `<button class="btn-icon" onclick="downloadMemberCardPNG()"><i class="fas fa-id-card"></i> تحميل بطاقة العضوية (PNG)</button>`;
            servicesHtml += `<button class="btn-icon" onclick="resignMember()"><i class="fas fa-user-slash"></i> طلب التخلي عن العضوية</button>`;
            servicesHtml += `</div>`;
        }
        servicesDiv.innerHTML = servicesHtml;
        
        // السجل (نشاطات أو مهام)
        const recordsDiv = document.getElementById('recordsContent');
        const records = isEmployee ? (currentUser.tasks || []) : (currentUser.activityLog || []);
        let recordsHtml = `<div class="section-title"><i class="fas fa-chart-line"></i> منحنى الأداء</div><canvas id="recordsChart" style="max-height:180px;"></canvas><div class="section-title" style="margin-top:15px;"><i class="fas fa-list"></i> سجل التفاصيل</div><div id="recordsList">`;
        if(records.length === 0) recordsHtml += `<p>لا توجد سجلات حتى الآن. أضف سجلاً جديداً.</p>`;
        else records.forEach(rec => {
            if(isEmployee) recordsHtml += `<div class="task-item"><strong>📌 ${escapeHtml(rec.title)}</strong> - ${rec.completed ? '✅ منجزة' : '⏳ قيد التنفيذ'} <br><small>${rec.date || ''}</small></div>`;
            else recordsHtml += `<div class="initiative-item"><strong>📝 ${escapeHtml(rec.action)}</strong><br><small>${rec.date || ''}</small><p>${rec.details || ''}</p></div>`;
        });
        recordsHtml += `</div><div class="flex-buttons"><button class="btn-icon" onclick="addNewRecord()"><i class="fas fa-plus-circle"></i> إضافة ${isEmployee ? 'مهمة جديدة' : 'نشاط جديد'}</button></div>`;
        recordsDiv.innerHTML = recordsHtml;
        const ctxRec = document.getElementById('recordsChart')?.getContext('2d');
        if(ctxRec) {
            const data = isEmployee ? (currentUser.performanceStats?.tasksLastWeek || [2,3,4,5,6,5,4]) : (currentUser.activityData || [3,5,2,8,4,6,7]);
            if(chartRecords) chartRecords.destroy();
            chartRecords = new Chart(ctxRec, { type: 'line', data: { labels: ['أسبوع1','أسبوع2','أسبوع3','أسبوع4','أسبوع5','أسبوع6','أسبوع7'], datasets: [{ label: isEmployee ? 'المهام المنجزة' : 'مستوى النشاط', data: data, borderColor: isEmployee ? '#f39c12' : '#2ecc71', fill: true }] } });
        }
        
        // الملف الشخصي
        const profileDiv = document.getElementById('profileContent');
        profileDiv.innerHTML = `<div style="text-align:center;"><div id="profileImgContainer"></div><div id="profileInfo"></div><div id="barcodeProfile" class="barcode-container"></div><div class="flex-buttons"><button class="btn-icon" id="uploadProfileBtn"><i class="fas fa-camera"></i> تغيير الصورة</button></div></div>`;
        const imgContainer = document.getElementById('profileImgContainer');
        imgContainer.innerHTML = currentUser.profileImage ? `<img src="${currentUser.profileImage}" class="profile-img">` : `<div class="profile-img" style="background:#ccc; display:flex; align-items:center; justify-content:center;"><i class="fas fa-user fa-3x"></i></div>`;
        let infoHtml = `<div class="info-row"><span class="info-label">الاسم الكامل:</span><span>${escapeHtml(currentUser.fullName)}</span></div><div class="info-row"><span class="info-label">نوع الحساب:</span><span class="${isEmployee ? 'badge-employee' : 'badge-member'}">${isEmployee ? 'موظف' : 'عضو'}</span></div><div class="info-row"><span class="info-label">رقم التعريف:</span><span>${currentUser.id}</span></div><div class="info-row"><span class="info-label">البريد الإلكتروني:</span><span>${escapeHtml(currentUser.email)}</span></div><div class="info-row"><span class="info-label">الهاتف:</span><span>${escapeHtml(currentUser.phone)}</span></div><div class="info-row"><span class="info-label">العنوان:</span><span>${escapeHtml(currentUser.address)}</span></div>`;
        if(isEmployee) infoHtml += `<div class="info-row"><span class="info-label">الخلية:</span><span>${escapeHtml(currentUser.cell)}</span></div><div class="info-row"><span class="info-label">المنصب:</span><span>${escapeHtml(currentUser.position)}</span></div>`;
        else infoHtml += `<div class="info-row"><span class="info-label">الاهتمامات:</span><span>${escapeHtml(currentUser.interests)}</span></div><div class="info-row"><span class="info-label">المؤسسات الشبابية:</span><span>${escapeHtml(currentUser.youthOrg)}</span></div><div class="info-row"><span class="info-label">تخصص الاهتمام:</span><span>${escapeHtml(currentUser.specialInterest || 'عام')}</span></div>`;
        document.getElementById('profileInfo').innerHTML = infoHtml;
        const barcodeId = 'barcode_' + Date.now();
        document.getElementById('barcodeProfile').innerHTML = `<canvas id="${barcodeId}"></canvas>`;
        setTimeout(() => JsBarcode(`#${barcodeId}`, currentUser.id, { format: "CODE128", width: 2, height: 40, displayValue: true }), 50);
        document.getElementById('uploadProfileBtn').onclick = () => { const inp=document.createElement('input'); inp.type='file'; inp.accept='image/png'; inp.onchange=e=>{ const f=e.target.files[0]; if(f){ const r=new FileReader(); r.onload=ev=>{ currentUser.profileImage=ev.target.result; localStorage.setItem('nazaha_user', JSON.stringify(currentUser)); renderAllTabs(); showToast('تم تحديث الصورة','success'); }; r.readAsDataURL(f); } }; inp.click(); };
    }
    
    // دوال الخدمات المشتركة
    function openIdeaModal() { const idea = prompt('شاركنا فكرتك أو مبادرتك المقترحة:'); if(idea) sendFormalEmail(`مبادرة مقترحة من ${currentUser.id}`, `أقترح المبادرة التالية: ${idea}\n\nيمكن تنفيذها بالتعاون مع الشركاء. أرفق خطة أولية وجدول زمني مقترح.`); }
    function openRatingModal() { const rating = prompt('تقييمك للمنتدى (1-5 نجوم):'); const comment = prompt('تعليقك المفصل:'); if(rating) sendFormalEmail(`تقييم المنتدى - ${currentUser.id}`, `أقيم تجربتي مع المنتدى بـ ${rating} من 5 نجوم.\nالتعليق: ${comment || 'لا يوجد'}\n\nأقترح تحسين واجهة الخدمات الإلكترونية وتوسيع نطاق المبادرات.`); }
    function renewMembership() { sendFormalEmail(`طلب تجديد العهدة - ${currentUser.id}`, `أتقدم بطلب تجديد عهدتي في المنتدى الشبابي للفكر والمشاركة المدنية، حيث أن تاريخ انتهاء العهدة هو ${currentUser.expiryDate || 'غير محدد'}، وأرغب في الاستمرار بالاستفادة من الخدمات والمساهمة في الأنشطة.`); }
    function openUpdateDataModal() { const data = { name: prompt('الاسم الكامل الجديد:', currentUser.fullName), address: prompt('العنوان الجديد:', currentUser.address), email: prompt('البريد الإلكتروني الجديد:', currentUser.email), phone: prompt('رقم الهاتف الجديد:', currentUser.phone), youthOrg: currentUser.type !== 'employee' ? prompt('المؤسسات الشبابية الجديدة:', currentUser.youthOrg || '') : null, interests: currentUser.type !== 'employee' ? prompt('الاهتمامات الجديدة:', currentUser.interests || '') : null, specialInterest: currentUser.type !== 'employee' ? prompt('تخصص الاهتمام الجديد:', currentUser.specialInterest || '') : null }; if(data.name) sendFormalEmail(`تحديث بيانات - ${currentUser.id}`, `أطلب تحديث بياناتي الشخصية:\nالاسم: ${data.name}\nالعنوان: ${data.address}\nالبريد: ${data.email}\nالهاتف: ${data.phone}\n${data.youthOrg ? `المؤسسات الشبابية: ${data.youthOrg}\nالاهتمامات: ${data.interests}\nتخصص الاهتمام: ${data.specialInterest}` : ''}`); }
    function openDonationModal() { const amt = prompt('مبلغ التبرع (بالدينار):'); if(amt) sendFormalEmail(`تبرع من ${currentUser.id}`, `أرغب في التبرع بمبلغ ${amt} دينار لدعم أنشطة المنتدى وبرامجه الشبابية. يرجى تزويدي بآلية التحويل المناسبة.`); }
    function changePasswordRequest() { const newPwd = prompt('كلمة السر الجديدة (سيتم إرسال طلب للإدارة):'); if(newPwd) sendFormalEmail(`طلب تغيير كلمة السر - ${currentUser.id}`, `أطلب تغيير كلمة السر الخاصة بحسابي إلى كلمة جديدة. يرجى تأكيد التغيير بعد التحقق من الهوية.`); }
    function resignMember() { if(confirm('هل أنت متأكد؟')) sendFormalEmail(`طلب التخلي عن العضوية - ${currentUser.id}`, `إدارة المنتدى المحترمة،\nأرغب في إنهاء عضويتي بالمنتدى اعتباراً من تاريخ هذا الطلب، وذلك لظروف خاصة. أطلب إتخاذ الإجراءات اللازمة.`); }
    function resignEmployee() { if(confirm('تقديم استقالة؟')) sendFormalEmail(`طلب استقالة موظف - ${currentUser.id}`, `إدارة الموارد البشرية،\nأتقدم باستقالتي من منصبي (${currentUser.position}) في خلية (${currentUser.cell})، على أن يكون آخر يوم عمل بعد شهر من تاريخه. شاكراً لكم فرصة العمل.`); }
    function requestTransfer() { const newCell = prompt('الخلية الجديدة المطلوب التحويل إليها:'); if(newCell) sendFormalEmail(`طلب تحويل خلية - ${currentUser.id}`, `مدير الشؤون الإدارية،\nأرغب في النقل إلى خلية "${newCell}" نظراً لملاءمة مؤهلاتي وخبراتي. أرفق تفاصيل إنجازاتي السابقة.`); }
    function closeModal() { document.getElementById('serviceModal').style.display = 'none'; }
    
    // تسجيل الدخول
    window.performLogin = async function() {
        const id = document.getElementById('loginId').value.trim();
        const pwd = document.getElementById('loginPass').value.trim();
        if(membersList.length === 0 && !(await fetchMembers())) { showToast('فشل تحميل البيانات', 'error'); return; }
        const user = membersList.find(m => m.id === id && m.password === pwd);
        if(user) {
            currentUser = JSON.parse(JSON.stringify(user));
            if(!currentUser.activityLog) currentUser.activityLog = [];
            if(!currentUser.tasks) currentUser.tasks = [];
            if(!currentUser.activityData) currentUser.activityData = [3,5,2,8,4,6,7];
            localStorage.setItem('nazaha_user', JSON.stringify(currentUser));
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboardContainer').style.display = 'block';
            await renderAllTabs();
            renderFreeSpace();
            showToast(`مرحباً ${currentUser.fullName}`, 'success');
        } else showToast('بيانات الدخول غير صحيحة', 'error');
    };
    function logout() { localStorage.removeItem('nazaha_user'); currentUser=null; document.getElementById('loginContainer').style.display='flex'; document.getElementById('dashboardContainer').style.display='none'; showToast('تم تسجيل الخروج','info'); }
    
    document.querySelectorAll('.tab-item').forEach(tab => tab.addEventListener('click', (e) => { document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active')); document.getElementById(tab.dataset.tab+'Tab').classList.add('active'); if(tab.dataset.tab === 'space') renderFreeSpace(); else if(currentUser) renderAllTabs(); }));
    
    window.addEventListener('load', () => { document.getElementById('loadingScreen').classList.add('hide'); const saved = localStorage.getItem('nazaha_user'); if(saved) { currentUser = JSON.parse(saved); document.getElementById('loginContainer').style.display='none'; document.getElementById('dashboardContainer').style.display='block'; renderAllTabs(); renderFreeSpace(); } });
</script>
</body>
</html>
