<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>نزاهة - فضاء المستفيد (تطبيق)</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Noto+Kufi+Arabic:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', 'Noto Kufi Arabic', sans-serif; }
        :root {
            --primary-green: #34c759;
            --accent-red: #ff3b30;
            --ios-bg: #f2f2f7;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #1c1c1e;
            --tab-bar-bg: rgba(255, 255, 255, 0.9);
        }
        body.dark {
            --ios-bg: #000000;
            --glass-bg: rgba(28, 28, 30, 0.9);
            --text-main: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.1);
            --tab-bar-bg: rgba(28, 28, 30, 0.95);
        }
        body { background: var(--ios-bg); color: var(--text-main); transition: 0.3s; margin: 0; padding: 0; }
        
        .loading-screen {
            position: fixed; top:0; left:0; width:100%; height:100%; background: var(--ios-bg); z-index: 10000;
            display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 20px;
            transition: 0.5s;
        }
        .loading-screen.hide { opacity: 0; visibility: hidden; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(52,199,89,0.2); border-top: 5px solid var(--primary-green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e6a3b, #0f3b22);
            padding: 20px;
        }
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .login-logo { width: 80px; height: 80px; margin: 0 auto 20px; background: var(--primary-green); border-radius: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .login-logo img { width: 100%; height: 100%; object-fit: cover; }
        .animated-text { font-size: 24px; font-weight: 800; margin: 20px 0; min-height: 80px; color: var(--primary-green); }
        .form-input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 30px; border: 1px solid var(--glass-border); background: var(--glass-bg); font-size: 16px; }
        .btn-submit { background: var(--primary-green); color: white; padding: 14px; border: none; border-radius: 30px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-submit:hover { transform: scale(1.02); }
        
        .dashboard-container { display: none; max-width: 800px; margin: 0 auto; padding: 80px 16px 80px; }
        .app-header {
            position: fixed; top:0; left:0; right:0; background: var(--glass-bg); backdrop-filter: blur(20px);
            padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }
        .app-header .logo { display: flex; align-items: center; gap: 10px; }
        .app-header .logo img { width: 40px; height: 40px; border-radius: 12px; }
        .app-header .logo span { font-weight: 800; color: var(--primary-green); }
        .logout-btn { background: var(--accent-red); color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-size: 14px; }
        
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--tab-bar-bg);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 12px 20px;
            border-top: 1px solid var(--glass-border);
            z-index: 1000;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
            font-size: 10px;
            font-weight: 600;
        }
        .tab-item i { font-size: 22px; }
        .tab-item.active { opacity: 1; color: var(--primary-green); }
        
        .tab-pane { display: none; animation: fadeIn 0.3s; }
        .tab-pane.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        
        .card-glass {
            background: var(--glass-bg);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
        }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .info-label { font-weight: 600; opacity: 0.7; }
        .badge-employee { background: #ff9f0a; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .badge-member { background: var(--primary-green); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background: #ccc; margin-bottom: 10px; }
        .barcode-container { background: white; padding: 10px; border-radius: 16px; text-align: center; margin-top: 15px; direction: ltr; }
        .countdown { font-family: monospace; font-size: 14px; background: rgba(0,0,0,0.05); padding: 4px 8px; border-radius: 12px; }
        .stars { display: inline-flex; gap: 5px; direction: ltr; }
        .stars i { font-size: 24px; color: #ffc107; cursor: pointer; }
        .btn-icon { background: rgba(52,199,89,0.15); border: none; padding: 10px 16px; border-radius: 30px; cursor: pointer; transition: 0.2s; margin: 5px; font-size: 14px; }
        .btn-icon:hover { background: var(--primary-green); color: white; }
        .notification-item { padding: 12px; border-bottom: 1px solid var(--glass-border); cursor: pointer; transition: 0.2s; }
        .notification-item:hover { background: rgba(52,199,89,0.1); }
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            z-index: 10001; display: none; align-items: center; justify-content: center; padding:20px;
        }
        .modal-container { background: var(--glass-bg); border-radius: 32px; max-width: 500px; width:100%; padding: 24px; position: relative; }
        .modal-close { position: absolute; top: 12px; left: 12px; background: var(--accent-red); border: none; width: 32px; height: 32px; border-radius: 50%; color: white; cursor: pointer; }
        canvas#activityChart { max-height: 200px; margin-top: 15px; }
        .flex-buttons { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px; }
        
        @media (max-width: 768px) {
            .dashboard-container { padding-top: 70px; padding-bottom: 70px; }
        }
    </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <div style="color: var(--primary-green); font-weight: bold;">جاري تحميل تطبيق نزاهة...</div>
</div>

<div id="loginContainer" class="login-container">
    <div class="login-card">
        <div class="login-logo"><img id="loginLogo" src="logo.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Crect width=%27100%27 height=%27100%27 rx=%2722%27 fill=%27%2334c759%27/%3E%3Ctext x=%2750%27 y=%2768%27 font-size=%2750%27 text-anchor=%27middle%27 fill=%27white%27%3Eن%3C/text%3E%3C/svg%3E'"></div>
        <div class="animated-text" id="loginAnimatedText">نزاهة</div>
        <input type="text" id="loginId" class="form-input" placeholder="رقم التعريف (رقم العضوية أو التوظيف)" autocomplete="off">
        <input type="password" id="loginPass" class="form-input" placeholder="كلمة السر">
        <button class="btn-submit" onclick="performLogin()">دخول</button>
    </div>
</div>

<div id="dashboardContainer" class="dashboard-container">
    <div class="app-header">
        <div class="logo"><img src="logo.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Crect width=%27100%27 height=%27100%27 rx=%2722%27 fill=%27%2334c759%27/%3E%3Ctext x=%2750%27 y=%2768%27 font-size=%2750%27 text-anchor=%27middle%27 fill=%27white%27%3Eن%3C/text%3E%3C/svg%3E'"><span>نزاهة</span></div>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" data-tab="info"><i class="fas fa-user-circle"></i><span>معلوماتي</span></div>
        <div class="tab-item" data-tab="services"><i class="fas fa-folder-open"></i><span>خدماتي</span></div>
        <div class="tab-item" data-tab="notifications"><i class="fas fa-bell"></i><span>إشعارات</span></div>
    </div>

    <div id="infoTab" class="tab-pane active">
        <div class="card-glass" id="profileCard">
            <div style="text-align:center;" id="profileImageContainer"></div>
            <div id="personalInfo"></div>
            <div id="barcodeContainer" class="barcode-container"></div>
            <div class="flex-buttons">
                <button class="btn-icon" id="uploadCardImageBtn"><i class="fas fa-camera"></i> رفع صورة شخصية</button>
                <button class="btn-icon" id="downloadCardBtn"><i class="fas fa-download"></i> تحميل البطاقة (PDF)</button>
            </div>
        </div>
        <div class="card-glass">
            <div class="section-title" style="font-weight:800; margin-bottom:10px;"><i class="fas fa-chart-line"></i> نشاطي خلال الأسابيع الماضية</div>
            <canvas id="activityChart" width="400" height="200"></canvas>
        </div>
    </div>

    <div id="servicesTab" class="tab-pane">
        <div class="card-glass">
            <div class="section-title" style="font-weight:800; margin-bottom:15px;"><i class="fas fa-tools"></i> الخدمات الإدارية</div>
            <div class="flex-buttons">
                <button class="btn-icon" onclick="openIdeaModal()"><i class="fas fa-lightbulb"></i> طرح فكرة/نشاط</button>
                <button class="btn-icon" onclick="openRatingModal()"><i class="fas fa-star"></i> تقييم المنتدى</button>
                <button class="btn-icon" onclick="openUpdateDataModal()"><i class="fas fa-edit"></i> تحديث بياناتي</button>
                <button class="btn-icon" onclick="requestCertificate()"><i class="fas fa-certificate"></i> شهادة عضوية</button>
                <button class="btn-icon" onclick="technicalSupport()"><i class="fas fa-headset"></i> دعم فني</button>
                <button class="btn-icon" onclick="submitSuggestion()"><i class="fas fa-comment"></i> اقتراح لتطوير المنتدى</button>
            </div>
            <div id="employeeSpecific" style="margin-top:15px; display:none;">
                <hr style="margin:15px 0;">
                <div class="section-title" style="font-weight:800;">المستندات الإدارية (خاص بالموظفين)</div>
                <p>🔹 عقد العمل (متاح عند الطلب عبر الدعم الفني)</p>
                <p>🔹 بطاقة التوظيف الرقمية</p>
                <p>🔹 تقرير الأداء السنوي</p>
            </div>
        </div>
    </div>

    <div id="notificationsTab" class="tab-pane">
        <div class="card-glass">
            <div class="section-title" style="font-weight:800; margin-bottom:15px;"><i class="fas fa-bell"></i> الإشعارات الواردة</div>
            <div id="notificationsList"></div>
        </div>
    </div>
</div>

<div id="serviceModal" class="modal-overlay">
    <div class="modal-container">
        <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        <h3 id="modalTitle"></h3>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    const MEMBER_URL = "https://raw.githubusercontent.com/nazahaa36/com/main/member.json";
    let membersList = [];
    let currentUser = null;
    let notificationInterval = null;
    let lastNotificationCount = 0;
    let countdownInterval = null;
    let chartInstance = null;
    let notificationSound = new Audio('nazaha_sound.mp3');
    notificationSound.volume = 0.6;
    
    function showToast(msg, type = 'info') {
        let toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle')}"></i> ${msg}`;
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.right = '20px';
        toast.style.left = '20px';
        toast.style.maxWidth = '400px';
        toast.style.background = type === 'success' ? 'rgba(52,199,89,0.95)' : (type === 'error' ? 'rgba(255,59,48,0.95)' : 'rgba(0,122,255,0.95)');
        toast.style.color = 'white';
        toast.style.padding = '12px 16px';
        toast.style.borderRadius = '18px';
        toast.style.zIndex = '10002';
        toast.style.backdropFilter = 'blur(10px)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }
    
    function escapeHtml(str) { return str ? str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' })[m]) : ''; }
    
    function sendViaMailto(subject, body) {
        window.location.href = `mailto:nazahaa36.inf@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        showToast('تم فتح بريدك الإلكتروني لإرسال البيانات', 'info');
    }
    
    async function fetchMembers() {
        try {
            const res = await fetch(MEMBER_URL);
            if (!res.ok) throw new Error();
            membersList = await res.json();
        } catch(e) {
            console.error(e);
            membersList = [];
        }
    }
    
    // التمييز بين عضو وموظف بناءً على قيمة الخلية
    function getUserType() {
        if (!currentUser) return 'عضو';
        const cell = currentUser.cell;
        if (cell && cell !== "غير متوفر" && cell !== "لا يوجد" && cell !== "null" && cell.trim() !== "") {
            return 'موظف';
        }
        return 'عضو';
    }
    
    window.performLogin = async function() {
        const id = document.getElementById('loginId').value.trim();
        const pwd = document.getElementById('loginPass').value.trim();
        if (!id || !pwd) { showToast('أدخل رقم التعريف وكلمة السر', 'error'); return; }
        await fetchMembers();
        const member = membersList.find(m => m.id === id && m.password === pwd);
        if (member) {
            currentUser = { ...member };
            if (!currentUser.notifications) currentUser.notifications = [];
            lastNotificationCount = currentUser.notifications.length;
            if (!currentUser.profileImage) currentUser.profileImage = '';
            localStorage.setItem('nazaha_dashboard_user', JSON.stringify(currentUser));
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboardContainer').style.display = 'block';
            startNotificationPolling();
            renderDashboard();
            showToast(`مرحباً ${currentUser.fullName}`, 'success');
        } else {
            showToast('بيانات غير صحيحة', 'error');
        }
    };
    
    function logout() {
        if (notificationInterval) clearInterval(notificationInterval);
        if (countdownInterval) clearInterval(countdownInterval);
        localStorage.removeItem('nazaha_dashboard_user');
        currentUser = null;
        document.getElementById('loginContainer').style.display = 'flex';
        document.getElementById('dashboardContainer').style.display = 'none';
        showToast('تم تسجيل الخروج', 'info');
    }
    
    async function checkForNewNotifications() {
        if (!currentUser) return;
        try {
            const res = await fetch(MEMBER_URL);
            if (!res.ok) throw new Error();
            const updatedMembers = await res.json();
            const updatedUser = updatedMembers.find(m => m.id === currentUser.id);
            if (updatedUser) {
                const oldNotifs = currentUser.notifications || [];
                const newNotifs = updatedUser.notifications || [];
                if (newNotifs.length > oldNotifs.length) {
                    const newOnes = newNotifs.slice(oldNotifs.length);
                    newOnes.forEach(notif => {
                        showToast(`${notif.title}: ${notif.body}`, 'info');
                        notificationSound.play().catch(e => console.log('صوت:', e));
                    });
                    currentUser.notifications = newNotifs;
                    lastNotificationCount = newNotifs.length;
                    renderNotifications();
                } else {
                    currentUser.notifications = newNotifs;
                }
                currentUser.fullName = updatedUser.fullName;
                currentUser.cell = updatedUser.cell;
                currentUser.role = updatedUser.role;
                currentUser.hiringDate = updatedUser.hiringDate;
                currentUser.expiryDate = updatedUser.expiryDate;
                currentUser.email = updatedUser.email;
                currentUser.phone = updatedUser.phone;
                currentUser.address = updatedUser.address;
                currentUser.profileImage = updatedUser.profileImage || currentUser.profileImage;
                currentUser.activityData = updatedUser.activityData || [3,5,2,8,4,6,7];
                renderDashboard();
            }
        } catch(e) { console.error(e); }
    }
    
    function startNotificationPolling() {
        if (notificationInterval) clearInterval(notificationInterval);
        notificationInterval = setInterval(checkForNewNotifications, 5000);
    }
    
    function calculateRemainingTime(expiryDateStr) {
        if (!expiryDateStr) return "غير محدد";
        const expiry = new Date(expiryDateStr);
        const now = new Date();
        const diff = expiry - now;
        if (diff <= 0) return "منتهية";
        const days = Math.floor(diff / (1000*60*60*24));
        const hours = Math.floor((diff % 86400000) / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);
        return `${days} يوم ${hours} س ${minutes} د ${seconds} ث`;
    }
    
    function renderDashboard() {
        if (!currentUser) return;
        const userType = getUserType();
        const isEmployee = (userType === 'موظف');
        const expiryDate = currentUser.expiryDate || (isEmployee ? '2027-12-31' : '2026-12-31');
        const remaining = calculateRemainingTime(expiryDate);
        
        let infoHtml = `
            <div class="info-row"><span class="info-label">الاسم الكامل:</span><span>${escapeHtml(currentUser.fullName)}</span></div>
            <div class="info-row"><span class="info-label">نوع الحساب:</span><span class="${isEmployee ? 'badge-employee' : 'badge-member'}">${isEmployee ? 'موظف' : 'عضو'}</span></div>
            <div class="info-row"><span class="info-label">رقم التعريف:</span><span>${escapeHtml(currentUser.id)}</span></div>
            <div class="info-row"><span class="info-label">تاريخ التسجيل:</span><span>${escapeHtml(currentUser.hiringDate || 'غير محدد')}</span></div>
            <div class="info-row"><span class="info-label">تاريخ الانتهاء:</span><span>${escapeHtml(expiryDate)}</span></div>
            <div class="info-row"><span class="info-label">المتبقي:</span><span class="countdown" id="countdownDisplay">${remaining}</span></div>
            <div class="info-row"><span class="info-label">البريد الإلكتروني:</span><span>${escapeHtml(currentUser.email)}</span></div>
            <div class="info-row"><span class="info-label">رقم الهاتف:</span><span>${escapeHtml(currentUser.phone)}</span></div>
            <div class="info-row"><span class="info-label">العنوان:</span><span>${escapeHtml(currentUser.address)}</span></div>
        `;
        if (isEmployee) {
            infoHtml += `<div class="info-row"><span class="info-label">الخلية:</span><span>${escapeHtml(currentUser.cell || '-')}</span></div>
                         <div class="info-row"><span class="info-label">المنصب (الصفة):</span><span>${escapeHtml(currentUser.role || '-')}</span></div>`;
        }
        document.getElementById('personalInfo').innerHTML = infoHtml;
        
        const profileImgHtml = currentUser.profileImage && currentUser.profileImage.startsWith('data:image')
            ? `<img src="${currentUser.profileImage}" class="profile-img" alt="الصورة الشخصية">`
            : `<div class="profile-img" style="background:#ccc; display:flex; align-items:center; justify-content:center;"><i class="fas fa-user fa-3x"></i></div>`;
        document.getElementById('profileImageContainer').innerHTML = profileImgHtml;
        
        const barcodeId = 'barcode_' + Date.now();
        document.getElementById('barcodeContainer').innerHTML = `<canvas id="${barcodeId}"></canvas>`;
        setTimeout(() => {
            JsBarcode(`#${barcodeId}`, currentUser.id, { format: "CODE128", width: 2, height: 40, displayValue: true });
        }, 50);
        
        if (countdownInterval) clearInterval(countdownInterval);
        function updateCountdown() {
            const rem = calculateRemainingTime(expiryDate);
            const cdEl = document.getElementById('countdownDisplay');
            if (cdEl) cdEl.innerText = rem;
            if (rem === 'منتهية') {
                notificationSound.play().catch(e=>{});
                clearInterval(countdownInterval);
            }
        }
        updateCountdown();
        countdownInterval = setInterval(updateCountdown, 1000);
        
        const ctx = document.getElementById('activityChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['أسبوع1', 'أسبوع2', 'أسبوع3', 'أسبوع4', 'أسبوع5', 'أسبوع6', 'أسبوع7'],
                datasets: [{
                    label: 'مستوى النشاط',
                    data: currentUser.activityData || [3,5,2,8,4,6,7],
                    borderColor: '#34c759',
                    backgroundColor: 'rgba(52,199,89,0.1)',
                    tension: 0.3,
                    fill: true
                }]
            },
            options: { responsive: true, maintainAspectRatio: true }
        });
        
        const empDiv = document.getElementById('employeeSpecific');
        if (isEmployee) empDiv.style.display = 'block';
        else empDiv.style.display = 'none';
        
        renderNotifications();
    }
    
    function renderNotifications() {
        const notifs = currentUser.notifications || [];
        const container = document.getElementById('notificationsList');
        if (!container) return;
        if (notifs.length === 0) { container.innerHTML = '<p>لا توجد إشعارات</p>'; return; }
        container.innerHTML = notifs.map(n => `
            <div class="notification-item" onclick="alert('${escapeHtml(n.title)}\\n\\n${escapeHtml(n.body)}')">
                <div><strong>${escapeHtml(n.title)}</strong></div>
                <div>${escapeHtml(n.body)}</div>
                <small>${n.date || ''}</small>
            </div>
        `).join('');
    }
    
    // رفع الصورة
    document.getElementById('uploadCardImageBtn')?.addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/png';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file && file.type === 'image/png') {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const base64 = ev.target.result;
                    currentUser.profileImage = base64;
                    localStorage.setItem('nazaha_dashboard_user', JSON.stringify(currentUser));
                    renderDashboard();
                    showToast('تم رفع الصورة الشخصية بنجاح', 'success');
                    sendViaMailto(`رفع صورة من ${currentUser.fullName}`, `تم رفع صورة شخصية جديدة. الرابط الداخلي محفوظ.`);
                };
                reader.readAsDataURL(file);
            } else {
                showToast('يرجى اختيار ملف PNG فقط', 'error');
            }
        };
        input.click();
    });
    
    // تحميل البطاقة PDF
    document.getElementById('downloadCardBtn')?.addEventListener('click', async () => {
        if (!currentUser.profileImage || !currentUser.profileImage.startsWith('data:image')) {
            showToast('يرجى رفع صورتك الشخصية أولاً (PNG)', 'error');
            document.getElementById('uploadCardImageBtn').click();
            return;
        }
        const userType = getUserType();
        const isEmployee = (userType === 'موظف');
        const expiryDate = currentUser.expiryDate || (isEmployee ? '2027-12-31' : '2026-12-31');
        const now = new Date();
        const formattedTime = `${now.toLocaleDateString('ar-EG')} - ${now.toLocaleTimeString('ar-EG')}`;
        
        const cardDiv = document.createElement('div');
        cardDiv.style.direction = 'rtl';
        cardDiv.style.fontFamily = 'Plus Jakarta Sans, Noto Kufi Arabic, sans-serif';
        cardDiv.style.background = 'white';
        cardDiv.style.color = 'black';
        cardDiv.style.padding = '20px';
        cardDiv.style.borderRadius = '28px';
        cardDiv.style.width = '500px';
        cardDiv.style.boxShadow = '0 10px 25px rgba(0,0,0,0.1)';
        cardDiv.style.border = '1px solid #ddd';
        
        cardDiv.innerHTML = `
            <div style="text-align:center; margin-bottom:15px;">
                <img src="logo.png" style="width:60px; height:60px; border-radius:12px;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Crect width=%27100%27 height=%27100%27 rx=%2722%27 fill=%27%2334c759%27/%3E%3Ctext x=%2750%27 y=%2768%27 font-size=%2750%27 text-anchor=%27middle%27 fill=%27white%27%3Eن%3C/text%3E%3C/svg%3E'">
                <h2 style="color:#34c759;">المنتدى الشبابي للفكر والمشاركة المدنية</h2>
                <h3>${isEmployee ? 'بطاقة توظيف' : 'بطاقة عضوية'}</h3>
            </div>
            <div style="display:flex; gap:15px; margin-bottom:15px;">
                <div style="flex:1; text-align:center;">
                    <img src="${currentUser.profileImage}" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:2px solid #34c759;">
                </div>
                <div style="flex:2;">
                    <div><strong>الاسم:</strong> ${escapeHtml(currentUser.fullName)}</div>
                    <div><strong>رقم التعريف:</strong> ${escapeHtml(currentUser.id)}</div>
                    <div><strong>النوع:</strong> ${isEmployee ? 'موظف' : 'عضو'}</div>
                    ${isEmployee ? `<div><strong>الخلية:</strong> ${escapeHtml(currentUser.cell || '-')}</div><div><strong>المنصب:</strong> ${escapeHtml(currentUser.role || '-')}</div>` : ''}
                    <div><strong>تاريخ التسجيل:</strong> ${escapeHtml(currentUser.hiringDate || '-')}</div>
                    <div><strong>تاريخ الانتهاء:</strong> ${escapeHtml(expiryDate)}</div>
                    <div><strong>تاريخ الإصدار:</strong> ${formattedTime}</div>
                </div>
            </div>
            <div style="text-align:center; margin-top:15px; border-top:1px solid #ccc; padding-top:10px;">
                <div id="tempBarcode" style="display:flex; justify-content:center;"></div>
                <p style="font-size:12px;">هذه البطاقة صالحة للاستخدام الرسمي</p>
            </div>
        `;
        document.body.appendChild(cardDiv);
        const bcContainer = cardDiv.querySelector('#tempBarcode');
        const canvasBc = document.createElement('canvas');
        bcContainer.appendChild(canvasBc);
        JsBarcode(canvasBc, currentUser.id, { format: "CODE128", width: 2, height: 40, displayValue: true });
        
        const opt = {
            margin:        [0.5, 0.5, 0.5, 0.5],
            filename:     `card_${currentUser.id}.pdf`,
            image:        { type: 'png', quality: 0.98 },
            html2canvas:  { scale: 2, letterRendering: true },
            jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(cardDiv).save().then(() => {
            document.body.removeChild(cardDiv);
            showToast('تم تحميل البطاقة كملف PDF', 'success');
        }).catch(() => {
            document.body.removeChild(cardDiv);
            showToast('فشل إنشاء PDF، حاول مرة أخرى', 'error');
        });
    });
    
    // الخدمات
    window.openIdeaModal = function() {
        document.getElementById('modalTitle').innerText = 'طرح فكرة أو نشاط';
        document.getElementById('modalBody').innerHTML = `<textarea id="ideaContent" class="form-input" rows="4" placeholder="اكتب فكرتك..."></textarea><button class="btn-submit" onclick="submitIdea()">إرسال</button>`;
        document.getElementById('serviceModal').style.display = 'flex';
    };
    window.submitIdea = function() {
        const content = document.getElementById('ideaContent').value.trim();
        if (!content) { showToast('يرجى كتابة الفكرة', 'error'); return; }
        sendViaMailto(`فكرة جديدة من ${currentUser.fullName}`, `المستخدم: ${currentUser.fullName}\nرقم التعريف: ${currentUser.id}\nنوع الحساب: ${getUserType()}\n\nالفكرة:\n${content}`);
        closeModal();
    };
    
    window.openRatingModal = function() {
        document.getElementById('modalTitle').innerText = 'تقييم المنتدى';
        document.getElementById('modalBody').innerHTML = `
            <div style="text-align:center;">
                <div class="stars" id="ratingStars">
                    <i class="far fa-star" data-value="1"></i><i class="far fa-star" data-value="2"></i><i class="far fa-star" data-value="3"></i><i class="far fa-star" data-value="4"></i><i class="far fa-star" data-value="5"></i>
                </div>
                <input type="hidden" id="ratingValue" value="0">
                <textarea id="ratingComment" class="form-input" rows="3" placeholder="تعليقك (اختياري)"></textarea>
                <button class="btn-submit" onclick="submitRating()">إرسال التقييم</button>
            </div>
        `;
        document.getElementById('serviceModal').style.display = 'flex';
        setTimeout(() => {
            const stars = document.querySelectorAll('#ratingStars i');
            stars.forEach(star => {
                star.addEventListener('click', function() {
                    const val = parseInt(this.dataset.value);
                    document.getElementById('ratingValue').value = val;
                    stars.forEach((s, idx) => { if (idx < val) s.className = 'fas fa-star'; else s.className = 'far fa-star'; });
                });
            });
        }, 100);
    };
    window.submitRating = function() {
        const rating = document.getElementById('ratingValue').value;
        if (!rating || rating === '0') { showToast('اختر تقييم بالنجوم', 'error'); return; }
        const comment = document.getElementById('ratingComment').value;
        sendViaMailto(`تقييم المنتدى من ${currentUser.fullName}`, `التقييم: ${rating} نجوم\nالتعليق: ${comment || 'لا يوجد'}`);
        closeModal();
    };
    
    window.openUpdateDataModal = function() {
        document.getElementById('modalTitle').innerText = 'تحديث بياناتي';
        document.getElementById('modalBody').innerHTML = `
            <input type="text" id="newFullName" class="form-input" placeholder="الاسم الكامل" value="${escapeHtml(currentUser.fullName)}">
            <input type="tel" id="newPhone" class="form-input" placeholder="رقم الهاتف" value="${escapeHtml(currentUser.phone)}">
            <input type="email" id="newEmail" class="form-input" placeholder="البريد الإلكتروني" value="${escapeHtml(currentUser.email)}">
            <input type="text" id="newAddress" class="form-input" placeholder="العنوان" value="${escapeHtml(currentUser.address)}">
            <button class="btn-submit" onclick="submitUpdateData()">إرسال طلب التحديث</button>
        `;
        document.getElementById('serviceModal').style.display = 'flex';
    };
    window.submitUpdateData = function() {
        const newName = document.getElementById('newFullName').value.trim();
        const newPhone = document.getElementById('newPhone').value.trim();
        const newEmail = document.getElementById('newEmail').value.trim();
        const newAddress = document.getElementById('newAddress').value.trim();
        if (!newName) { showToast('الاسم مطلوب', 'error'); return; }
        const body = `البيانات الحالية:\nالاسم: ${currentUser.fullName}\nالهاتف: ${currentUser.phone}\nالبريد: ${currentUser.email}\nالعنوان: ${currentUser.address}\n\nالبيانات الجديدة المطلوبة:\nالاسم: ${newName}\nالهاتف: ${newPhone}\nالبريد: ${newEmail}\nالعنوان: ${newAddress}`;
        sendViaMailto(`طلب تحديث بيانات من ${currentUser.id}`, body);
        closeModal();
    };
    
    window.requestCertificate = function() {
        const type = prompt('نوع الشهادة (عضوية/تطوع/مشاركة):', 'عضوية');
        if (type) sendViaMailto(`طلب شهادة ${type}`, `الاسم: ${currentUser.fullName}\nرقم التعريف: ${currentUser.id}\nنوع الشهادة: ${type}`);
    };
    window.technicalSupport = function() {
        const issue = prompt('وصف المشكلة التقنية:');
        if (issue) sendViaMailto(`دعم فني من ${currentUser.id}`, `الاسم: ${currentUser.fullName}\nالمشكلة: ${issue}`);
    };
    window.submitSuggestion = function() {
        const suggestion = prompt('اكتب اقتراحك لتطوير المنتدى:');
        if (suggestion) sendViaMailto(`اقتراح تطوير من ${currentUser.id}`, `الاسم: ${currentUser.fullName}\nالاقتراح: ${suggestion}`);
    };
    
    function closeModal() { document.getElementById('serviceModal').style.display = 'none'; }
    window.closeModal = closeModal;
    
    document.querySelectorAll('.tab-item').forEach(tab => {
        tab.addEventListener('click', () => {
            const targetTab = tab.dataset.tab;
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
            if (targetTab === 'info') document.getElementById('infoTab').classList.add('active');
            else if (targetTab === 'services') document.getElementById('servicesTab').classList.add('active');
            else if (targetTab === 'notifications') document.getElementById('notificationsTab').classList.add('active');
        });
    });
    
    const loginPhrases = ["نزاهة", "جيل واعٍ", "جزائر الغد", "فكر يحرر", "مشاركة تبني"];
    let idx = 0;
    setInterval(() => {
        const el = document.getElementById('loginAnimatedText');
        if (el) el.innerText = loginPhrases[idx % loginPhrases.length];
        idx++;
    }, 2000);
    
    window.addEventListener('load', async () => {
        document.getElementById('loadingScreen').classList.add('hide');
        const saved = localStorage.getItem('nazaha_dashboard_user');
        if (saved) {
            currentUser = JSON.parse(saved);
            await fetchMembers();
            const onlineUser = membersList.find(m => m.id === currentUser.id);
            if (onlineUser) {
                currentUser = { ...onlineUser };
                if (!currentUser.notifications) currentUser.notifications = [];
                lastNotificationCount = currentUser.notifications.length;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('dashboardContainer').style.display = 'block';
                startNotificationPolling();
                renderDashboard();
            } else {
                localStorage.removeItem('nazaha_dashboard_user');
            }
        }
    });
</script>
</body>
</html>
