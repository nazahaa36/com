<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>نزاهة - NA-Space | المنصة المتكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Noto+Kufi+Arabic:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', 'Noto Kufi Arabic', sans-serif; }
        :root {
            --primary-green: #34c759;
            --accent-red: #ff3b30;
            --ios-bg: #f2f2f7;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #1c1c1e;
            --tab-bar-bg: rgba(255, 255, 255, 0.9);
        }
        body.dark {
            --ios-bg: #000000;
            --glass-bg: rgba(28, 28, 30, 0.9);
            --text-main: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.1);
            --tab-bar-bg: rgba(28, 28, 30, 0.95);
        }
        body { background: var(--ios-bg); color: var(--text-main); transition: 0.3s; margin: 0; padding: 0; }
        
        .loading-screen {
            position: fixed; top:0; left:0; width:100%; height:100%; background: var(--ios-bg); z-index: 10000;
            display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 20px;
            transition: 0.5s;
        }
        .loading-screen.hide { opacity: 0; visibility: hidden; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(52,199,89,0.2); border-top: 5px solid var(--primary-green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e6a3b, #0f3b22);
            padding: 20px;
        }
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .login-logo { width: 80px; height: 80px; margin: 0 auto 20px; background: var(--primary-green); border-radius: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .login-logo img { width: 100%; height: 100%; object-fit: cover; }
        .animated-text { font-size: 24px; font-weight: 800; margin: 20px 0; min-height: 80px; color: var(--primary-green); }
        .form-input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 30px; border: 1px solid var(--glass-border); background: var(--glass-bg); font-size: 16px; color: var(--text-main); }
        .btn-submit { background: var(--primary-green); color: white; padding: 14px; border: none; border-radius: 30px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-submit:hover { transform: scale(1.02); }
        
        .dashboard-container { display: none; max-width: 800px; margin: 0 auto; padding: 80px 16px 80px; }
        .app-header {
            position: fixed; top:0; left:0; right:0; background: var(--glass-bg); backdrop-filter: blur(20px);
            padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }
        .app-header .logo { display: flex; align-items: center; gap: 10px; }
        .app-header .logo img { width: 40px; height: 40px; border-radius: 12px; }
        .app-header .logo span { font-weight: 800; color: var(--primary-green); }
        .logout-btn { background: var(--accent-red); color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-size: 14px; }
        
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--tab-bar-bg);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 12px 20px;
            border-top: 1px solid var(--glass-border);
            z-index: 1000;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
            font-size: 10px;
            font-weight: 600;
        }
        .tab-item i { font-size: 22px; }
        .tab-item.active { opacity: 1; color: var(--primary-green); }
        
        .tab-pane { display: none; animation: fadeIn 0.3s; }
        .tab-pane.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        
        .card-glass {
            background: var(--glass-bg);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
        }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .info-label { font-weight: 600; opacity: 0.7; }
        .badge-employee { background: #ff9f0a; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .badge-member { background: var(--primary-green); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background: #ccc; margin-bottom: 10px; cursor: pointer; border: 2px solid var(--primary-green); }
        .barcode-container { background: white; padding: 10px; border-radius: 16px; text-align: center; margin-top: 15px; direction: ltr; }
        .countdown { font-family: monospace; font-size: 14px; background: rgba(0,0,0,0.05); padding: 4px 8px; border-radius: 12px; }
        .stars { display: inline-flex; gap: 5px; direction: ltr; }
        .stars i { font-size: 24px; color: #ffc107; cursor: pointer; }
        .btn-icon { background: rgba(52,199,89,0.15); border: none; padding: 10px 16px; border-radius: 30px; cursor: pointer; transition: 0.2s; margin: 5px; font-size: 14px; }
        .btn-icon:hover { background: var(--primary-green); color: white; }
        .notification-item { padding: 12px; border-bottom: 1px solid var(--glass-border); cursor: pointer; transition: 0.2s; }
        .notification-item:hover { background: rgba(52,199,89,0.1); }
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            z-index: 10001; display: none; align-items: center; justify-content: center; padding:20px;
        }
        .modal-container { background: var(--glass-bg); border-radius: 32px; max-width: 550px; width:100%; max-height: 80vh; overflow-y: auto; padding: 24px; position: relative; }
        .modal-close { position: absolute; top: 12px; left: 12px; background: var(--accent-red); border: none; width: 32px; height: 32px; border-radius: 50%; color: white; cursor: pointer; }
        canvas#activityChart { max-height: 200px; margin-top: 15px; }
        .flex-buttons { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px; }
        .initiative-item, .task-item { background: rgba(52,199,89,0.1); border-radius: 20px; padding: 12px; margin-bottom: 12px; transition: 0.2s; }
        .initiative-item h4 { color: var(--primary-green); margin-bottom: 5px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .stat-card { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 12px; text-align: center; }
        .stat-number { font-size: 28px; font-weight: 800; color: var(--primary-green); }
        @media (max-width: 768px) {
            .dashboard-container { padding-top: 70px; padding-bottom: 70px; }
        }
    </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <div style="color: var(--primary-green); font-weight: bold;">جاري تحميل NA-Space...</div>
</div>

<div id="loginContainer" class="login-container">
    <div class="login-card">
        <div class="login-logo"><img id="loginLogo" src="logo.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Crect width=%27100%27 height=%27100%27 rx=%2722%27 fill=%27%2334c759%27/%3E%3Ctext x=%2750%27 y=%2768%27 font-size=%2750%27 text-anchor=%27middle%27 fill=%27white%27%3Eن%3C/text%3E%3C/svg%3E'"></div>
        <div class="animated-text" id="loginAnimatedText">NA-Space</div>
        <input type="text" id="loginId" class="form-input" placeholder="رقم التعريف" autocomplete="off">
        <input type="password" id="loginPass" class="form-input" placeholder="كلمة السر">
        <button class="btn-submit" onclick="performLogin()">دخول</button>
    </div>
</div>

<div id="dashboardContainer" class="dashboard-container">
    <div class="app-header">
        <div class="logo"><img src="logo.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Crect width=%27100%27 height=%27100%27 rx=%2722%27 fill=%27%2334c759%27/%3E%3Ctext x=%2750%27 y=%2768%27 font-size=%2750%27 text-anchor=%27middle%27 fill=%27white%27%3Eن%3C/text%3E%3C/svg%3E'"><span>NA-Space</span></div>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" data-tab="home"><i class="fas fa-home"></i><span>الرئيسية</span></div>
        <div class="tab-item" data-tab="services"><i class="fas fa-folder-open"></i><span>الخدمات</span></div>
        <div class="tab-item" data-tab="records"><i class="fas fa-history"></i><span>السجل</span></div>
        <div class="tab-item" data-tab="profile"><i class="fas fa-user"></i><span>ملفي الشخصي</span></div>
    </div>

    <!-- تبويب الرئيسية -->
    <div id="homeTab" class="tab-pane active">
        <div id="homeContent" class="card-glass">
            <!-- سيتم ملؤه ديناميكياً حسب نوع المستخدم -->
        </div>
    </div>

    <!-- تبويب الخدمات (مشترك بين الأعضاء والموظفين مع بعض الاختلافات) -->
    <div id="servicesTab" class="tab-pane">
        <div class="card-glass">
            <div class="section-title" style="font-weight:800; margin-bottom:15px;"><i class="fas fa-tools"></i> الخدمات الإدارية</div>
            <div class="flex-buttons">
                <button class="btn-icon" onclick="openIdeaModal()"><i class="fas fa-lightbulb"></i> إقترح الآن</button>
                <button class="btn-icon" onclick="openRatingModal()"><i class="fas fa-star"></i> تقييم المنتدى</button>
                <button class="btn-icon" onclick="renewMembership()"><i class="fas fa-sync-alt"></i> تجديد العضوية</button>
                <button class="btn-icon" onclick="openUpdateDataModal()"><i class="fas fa-edit"></i> تعديل البيانات</button>
                <button class="btn-icon" onclick="openDonationModal()"><i class="fas fa-hand-holding-heart"></i> التبرع</button>
                <button class="btn-icon" onclick="changePasswordRequest()"><i class="fas fa-key"></i> طلب تغيير كلمة السر</button>
                <button class="btn-icon" onclick="resignRequest()"><i class="fas fa-sign-out-alt"></i> التخلي عن العضوية</button>
            </div>
            <div id="employeeSpecificServices" style="margin-top:15px; display:none;">
                <hr><div class="section-title" style="font-weight:800;">خدمات الموظف الإضافية</div>
                <div class="flex-buttons">
                    <button class="btn-icon" onclick="uploadReport()"><i class="fas fa-file-alt"></i> رفع التقارير (PDF)</button>
                    <button class="btn-icon" onclick="requestTransfer()"><i class="fas fa-exchange-alt"></i> طلب تحويل الخلية</button>
                    <button class="btn-icon" onclick="resignEmployee()"><i class="fas fa-user-minus"></i> طلب الإستقالة</button>
                    <button class="btn-icon" onclick="downloadEmploymentCertificate()"><i class="fas fa-certificate"></i> تحميل شهادة التوظيف</button>
                </div>
            </div>
        </div>
    </div>

    <!-- تبويب السجل (نشاطات الأعضاء أو مهام الموظفين) -->
    <div id="recordsTab" class="tab-pane">
        <div class="card-glass">
            <div class="section-title" style="font-weight:800; margin-bottom:10px;"><i class="fas fa-chart-line"></i> منحنى التطور</div>
            <canvas id="performanceChart" width="400" height="200"></canvas>
        </div>
        <div class="card-glass">
            <div class="section-title" style="font-weight:800; margin-bottom:10px;"><i class="fas fa-list-ul"></i> سجل التفاصيل</div>
            <div id="recordsDetailedList" style="max-height:250px; overflow-y:auto;"></div>
            <button class="btn-icon" id="addRecordBtn" style="margin-top:10px;"><i class="fas fa-plus-circle"></i> إضافة نشاط/مهمة جديدة</button>
        </div>
    </div>

    <!-- تبويب ملفي الشخصي -->
    <div id="profileTab" class="tab-pane">
        <div class="card-glass">
            <div style="text-align:center;" id="profileImageContainer"></div>
            <div id="personalInfo"></div>
            <div id="barcodeContainer" class="barcode-container"></div>
            <div class="flex-buttons">
                <button class="btn-icon" id="uploadCardImageBtn"><i class="fas fa-camera"></i> تغيير الصورة</button>
                <button class="btn-icon" id="downloadCardBtn"><i class="fas fa-download"></i> تحميل البطاقة (PDF)</button>
                <button class="btn-icon" id="downloadCardPngBtn"><i class="fas fa-image"></i> تحميل بطاقة PNG</button>
            </div>
        </div>
    </div>
</div>

<div id="serviceModal" class="modal-overlay">
    <div class="modal-container">
        <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        <h3 id="modalTitle"></h3>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    // ======================== روابط البيانات الخارجية ========================
    const MEMBER_URL = "https://raw.githubusercontent.com/nazahaa36/com/main/member.json";
    const INITIATIVES_URL = "https://raw.githubusercontent.com/nazahaa36/com/main/initiatives.json";
    
    let membersList = [];
    let currentUser = null;
    let chartInstance = null;
    let perfChartInstance = null;
    
    // دوال مساعدة
    function showToast(msg, type = 'info') {
        let toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle')}"></i> ${msg}`;
        toast.style.cssText = 'position:fixed; bottom:20px; right:20px; left:20px; max-width:400px; background:rgba(0,0,0,0.8); color:white; padding:12px 16px; border-radius:18px; z-index:10002; backdrop-filter:blur(10px);';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }
    
    function escapeHtml(str) { return str ? String(str).replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' })[m]) : ''; }
    
    function sendViaMailto(subject, body) {
        window.location.href = `mailto:nazahaa36.inf@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        showToast('تم فتح البريد لإرسال البيانات', 'info');
    }
    
    async function fetchMembers() {
        try {
            const res = await fetch(MEMBER_URL);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            membersList = await res.json();
            if (!Array.isArray(membersList) || membersList.length === 0) throw new Error('ملف فارغ');
            showToast('تم جلب بيانات الأعضاء', 'success');
            return true;
        } catch(e) {
            console.error(e);
            showToast('خطأ في تحميل بيانات الأعضاء', 'error');
            return false;
        }
    }
    
    async function fetchInitiatives() {
        try {
            const res = await fetch(INITIATIVES_URL);
            if (!res.ok) throw new Error();
            return await res.json();
        } catch(e) {
            console.warn('استخدام بيانات افتراضية للمبادرات');
            return [
                { title: "مبادرة التشجير", description: "زراعة 1000 شجرة في المدينة", date: "2025-04-01", link: "#" },
                { title: "ورشة ريادة الأعمال", description: "تدريب مجاني للشباب", date: "2025-04-15", link: "#" },
                { title: "حملة نظافة الشواطئ", description: "المشاركة في حماية البيئة", date: "2025-04-20", link: "#" }
            ];
        }
    }
    
    function getUserType() {
        if (!currentUser) return 'عضو';
        const cell = currentUser.cell;
        if (cell && cell !== "غير متوفر" && cell !== "لا يوجد" && cell !== "null" && cell.trim() !== "") return 'موظف';
        return 'عضو';
    }
    
    // عرض المحتوى الرئيسي حسب النوع
    async function renderHomeTab() {
        const homeDiv = document.getElementById('homeContent');
        const isEmployee = getUserType() === 'موظف';
        if (isEmployee) {
            // لوحة تحكم الموظف بإحصائيات حقيقية
            const tasks = currentUser.tasks || [];
            const completed = tasks.filter(t => t.completed).length;
            const pending = tasks.length - completed;
            const performance = currentUser.performanceStats || { efficiency: 85, satisfaction: 4.2, tasksLastWeek: [2,3,5,4,6,7,5] };
            homeDiv.innerHTML = `
                <h3><i class="fas fa-chart-simple"></i> لوحة تحكم الموظف</h3>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-number">${tasks.length}</div><div>إجمالي المهام</div></div>
                    <div class="stat-card"><div class="stat-number">${completed}</div><div>مهام منجزة</div></div>
                    <div class="stat-card"><div class="stat-number">${pending}</div><div>مهام معلقة</div></div>
                    <div class="stat-card"><div class="stat-number">${performance.efficiency}%</div><div>كفاءة الأداء</div></div>
                </div>
                <canvas id="empTasksChart" style="max-height:180px;"></canvas>
                <div class="flex-buttons" style="margin-top:15px;">
                    <button class="btn-icon" onclick="addTaskFromHome()"><i class="fas fa-tasks"></i> إضافة مهمة جديدة</button>
                </div>
            `;
            const ctx = document.getElementById('empTasksChart')?.getContext('2d');
            if(ctx) new Chart(ctx, { type: 'line', data: { labels: ['أسبوع1','أسبوع2','أسبوع3','أسبوع4','أسبوع5','أسبوع6','أسبوع7'], datasets: [{ label: 'المهام المنجزة', data: performance.tasksLastWeek, borderColor: '#34c759', fill: false }] } });
        } else {
            // عرض المبادرات للعضو
            const initiatives = await fetchInitiatives();
            let html = `<h3><i class="fas fa-bullhorn"></i> المبادرات والأنشطة</h3><div>`;
            initiatives.forEach(init => {
                html += `<div class="initiative-item"><h4>${escapeHtml(init.title)}</h4><p>${escapeHtml(init.description)}</p><small>${init.date} | <a href="${init.link}" target="_blank">تفاصيل</a></small></div>`;
            });
            html += `</div><button class="btn-icon" onclick="openIdeaModal()"><i class="fas fa-plus"></i> شارك بفكرة جديدة</button>`;
            homeDiv.innerHTML = html;
        }
    }
    
    // عرض السجل (نشاطات أو مهام)
    function renderRecordsTab() {
        const isEmployee = getUserType() === 'موظف';
        const records = isEmployee ? (currentUser.tasks || []) : (currentUser.activityLog || []);
        const container = document.getElementById('recordsDetailedList');
        if(!records.length) { container.innerHTML = '<p>لا توجد سجلات بعد. أضف سجلاً جديداً!</p>'; return; }
        let html = '';
        records.forEach((rec, idx) => {
            if(isEmployee) html += `<div class="task-item"><strong>📌 ${escapeHtml(rec.title)}</strong> - ${rec.completed ? '✅ منجزة' : '⏳ قيد التنفيذ'} <br><small>تاريخ: ${rec.date || ''}</small></div>`;
            else html += `<div class="initiative-item"><strong>📝 ${escapeHtml(rec.action)}</strong><br><small>${rec.date || ''}</small><p>${rec.details || ''}</p></div>`;
        });
        container.innerHTML = html;
        
        // تحديث الرسم البياني للمنحنى
        const ctx = document.getElementById('performanceChart').getContext('2d');
        let chartData;
        if(isEmployee) {
            const tasksPerWeek = [2,3,5,4,6,7,5]; // افتراضي أو من stats
            chartData = { labels: ['أسبوع1','أسبوع2','أسبوع3','أسبوع4','أسبوع5','أسبوع6','أسبوع7'], datasets: [{ label: 'المهام المنجزة', data: tasksPerWeek, borderColor: '#ff9f0a', backgroundColor: 'rgba(255,159,10,0.2)', fill: true }] };
        } else {
            const activity = currentUser.activityData || [3,5,2,8,4,6,7];
            chartData = { labels: ['أسبوع1','أسبوع2','أسبوع3','أسبوع4','أسبوع5','أسبوع6','أسبوع7'], datasets: [{ label: 'مستوى النشاط', data: activity, borderColor: '#34c759', fill: true }] };
        }
        if(perfChartInstance) perfChartInstance.destroy();
        perfChartInstance = new Chart(ctx, { type: 'line', data: chartData, options: { responsive: true, maintainAspectRatio: true } });
    }
    
    // إضافة نشاط/مهمة جديدة وتحديث المنحنى
    function addNewRecord() {
        const isEmployee = getUserType() === 'موظف';
        const title = prompt(isEmployee ? 'عنوان المهمة الجديدة:' : 'عنوان النشاط الجديد:');
        if(!title) return;
        const details = prompt('تفاصيل إضافية:') || '';
        const newRecord = { title: title, details: details, date: new Date().toLocaleDateString('ar-EG'), completed: false };
        if(isEmployee) {
            if(!currentUser.tasks) currentUser.tasks = [];
            currentUser.tasks.push(newRecord);
            // تحديث الإحصائيات والمنحنى: زيادة المهام الأسبوعية افتراضياً
            if(!currentUser.performanceStats) currentUser.performanceStats = { tasksLastWeek: [2,3,5,4,6,7,5], efficiency: 85 };
            currentUser.performanceStats.tasksLastWeek[6] += 1;
            currentUser.performanceStats.efficiency = Math.min(100, currentUser.performanceStats.efficiency + 2);
        } else {
            if(!currentUser.activityLog) currentUser.activityLog = [];
            currentUser.activityLog.push({ action: title, details: details, date: new Date().toLocaleDateString('ar-EG') });
            if(!currentUser.activityData) currentUser.activityData = [3,5,2,8,4,6,7];
            currentUser.activityData[6] = Math.min(10, currentUser.activityData[6] + 1);
        }
        localStorage.setItem('nazaha_dashboard_user', JSON.stringify(currentUser));
        renderRecordsTab();
        renderHomeTab(); // تحديث لوحة الموظف
        showToast('تمت إضافة السجل بنجاح', 'success');
    }
    
    // طلب تغيير كلمة السر
    function changePasswordRequest() {
        const newPwd = prompt('الرجاء إدخال كلمة السر الجديدة (سيتم إرسال طلب إلى الإدارة):');
        if(newPwd && newPwd.length >= 4) {
            sendViaMailto(`طلب تغيير كلمة السر - ${currentUser.id}`, `الاسم: ${currentUser.fullName}\nالرقم التعريفي: ${currentUser.id}\nكلمة السر الجديدة المرغوبة: ${newPwd}\nيرجى الموافقة على التغيير.`);
        } else if(newPwd) showToast('كلمة السر يجب أن تكون 4 أحرف على الأقل', 'error');
    }
    
    // باقي الوظائف: تجديد العضوية، تعديل البيانات، التبرع، الاستقالة، رفع التقارير...
    function renewMembership() { sendViaMailto(`طلب تجديد العضوية - ${currentUser.id}`, `الاسم: ${currentUser.fullName}\nتاريخ الانتهاء الحالي: ${currentUser.expiryDate || 'غير محدد'}\nيرجى تجديد العضوية.`); }
    function resignRequest() { if(confirm('هل أنت متأكد من طلب التخلي عن العضوية؟')) sendViaMailto(`طلب التخلي عن العضوية - ${currentUser.id}`, `الاسم: ${currentUser.fullName}\nالرقم: ${currentUser.id}\nأرغب في إنهاء العضوية.`); }
    function resignEmployee() { if(confirm('تقديم استقالة من الوظيفة؟')) sendViaMailto(`طلب استقالة موظف - ${currentUser.id}`, `الاسم: ${currentUser.fullName}\nالخلية: ${currentUser.cell}\nالمنصب: ${currentUser.position}`); }
    function uploadReport() { const fileInput = document.createElement('input'); fileInput.type='file'; fileInput.accept='.pdf'; fileInput.onchange=e=>{ if(e.target.files[0]) sendViaMailto(`تقرير من ${currentUser.id}`, `تم رفع ملف PDF: ${e.target.files[0].name}`); }; fileInput.click(); }
    function requestTransfer() { const newCell = prompt('الخلية الجديدة المراد التحويل إليها:'); if(newCell) sendViaMailto(`طلب تحويل الخلية - ${currentUser.id}`, `الموظف: ${currentUser.fullName}\nالخلية الحالية: ${currentUser.cell}\nالخلية المطلوبة: ${newCell}`); }
    function downloadEmploymentCertificate() { alert('سيتم إصدار شهادة التوظيف بصيغة PDF احترافية (محاكاة). سيتم إرسالها إلى بريدك قريباً.'); sendViaMailto(`طلب شهادة توظيف - ${currentUser.id}`, `الاسم: ${currentUser.fullName}\nالمنصب: ${currentUser.position}`); }
    function openDonationModal() { const amount = prompt('أدخل مبلغ التبرع (بالدينار):'); if(amount) sendViaMailto(`تبرع من ${currentUser.id}`, `تبرع بمبلغ ${amount} دينار لدعم المنتدى.`); }
    function openIdeaModal() { const idea = prompt('شاركنا فكرتك أو مبادرتك:'); if(idea) sendViaMailto(`فكرة جديدة من ${currentUser.id}`, idea); }
    function openRatingModal() { const rating = prompt('تقييم المنتدى من 1 إلى 5 نجوم:'); const comment = prompt('تعليقك:'); if(rating) sendViaMailto(`تقييم المنتدى`, `المستخدم: ${currentUser.fullName}\nالتقييم: ${rating} نجوم\nتعليق: ${comment||''}`); }
    function openUpdateDataModal() { const newName = prompt('الاسم الجديد:', currentUser.fullName); const newAddress = prompt('العنوان الجديد:', currentUser.address); if(newName) sendViaMailto(`تحديث بيانات ${currentUser.id}`, `الاسم: ${newName}\nالعنوان: ${newAddress}`); }
    
    // عرض بيانات الملف الشخصي
    function renderProfileTab() {
        const isEmployee = getUserType() === 'موظف';
        let infoHtml = `<div class="info-row"><span class="info-label">الاسم الكامل:</span><span>${escapeHtml(currentUser.fullName)}</span></div>
                        <div class="info-row"><span class="info-label">نوع الحساب:</span><span class="${isEmployee ? 'badge-employee' : 'badge-member'}">${isEmployee ? 'موظف' : 'عضو'}</span></div>
                        <div class="info-row"><span class="info-label">رقم التعريف:</span><span>${escapeHtml(currentUser.id)}</span></div>
                        <div class="info-row"><span class="info-label">البريد الإلكتروني:</span><span>${escapeHtml(currentUser.email || 'غير مسجل')}</span></div>
                        <div class="info-row"><span class="info-label">الهاتف:</span><span>${escapeHtml(currentUser.phone || 'غير مسجل')}</span></div>
                        <div class="info-row"><span class="info-label">العنوان:</span><span>${escapeHtml(currentUser.address)}</span></div>
                        <div class="info-row"><span class="info-label">الاهتمامات:</span><span>${escapeHtml(currentUser.interests || 'عام')}</span></div>`;
        if(isEmployee) infoHtml += `<div class="info-row"><span class="info-label">الخلية:</span><span>${escapeHtml(currentUser.cell)}</span></div><div class="info-row"><span class="info-label">المنصب:</span><span>${escapeHtml(currentUser.position)}</span></div>`;
        else infoHtml += `<div class="info-row"><span class="info-label">الانخراط في المؤسسات الشبابية:</span><span>${escapeHtml(currentUser.youthOrg || 'لا يوجد')}</span></div>`;
        document.getElementById('personalInfo').innerHTML = infoHtml;
        
        const profileImgHtml = currentUser.profileImage ? `<img src="${currentUser.profileImage}" class="profile-img">` : `<div class="profile-img" style="background:#ccc; display:flex; align-items:center; justify-content:center;"><i class="fas fa-user fa-3x"></i></div>`;
        document.getElementById('profileImageContainer').innerHTML = profileImgHtml;
        
        const barcodeId = 'barcode_' + Date.now();
        document.getElementById('barcodeContainer').innerHTML = `<canvas id="${barcodeId}"></canvas>`;
        setTimeout(() => JsBarcode(`#${barcodeId}`, currentUser.id, { format: "CODE128", width: 2, height: 40, displayValue: true }), 50);
    }
    
    // تحميل البطاقة PDF/PNG
    async function downloadCard(asPng=false) {
        if(!currentUser.profileImage) { showToast('يرجى رفع صورتك أولاً', 'error'); return; }
        const isEmployee = getUserType() === 'موظف';
        const cardDiv = document.createElement('div');
        cardDiv.style.cssText = 'direction:rtl; font-family:sans-serif; background:white; color:black; padding:20px; border-radius:28px; width:500px; margin:auto;';
        cardDiv.innerHTML = `<div style="text-align:center;"><img src="logo.png" style="width:60px;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Crect width=%27100%27 height=%27100%27 rx=%2722%27 fill=%27%2334c759%27/%3E%3Ctext x=%2750%27 y=%2768%27 font-size=%2750%27 text-anchor=%27middle%27 fill=%27white%27%3Eن%3C/text%3E%3C/svg%3E'"><h2 style="color:#34c759;">المنتدى الشبابي للفكر والمشاركة المدنية</h2><h3>${isEmployee ? 'بطاقة توظيف' : 'بطاقة عضوية'}</h3></div>
        <div style="display:flex; gap:15px; margin:15px 0;"><div><img src="${currentUser.profileImage}" style="width:100px;height:100px;border-radius:50%;"></div><div><div><strong>الاسم:</strong> ${escapeHtml(currentUser.fullName)}</div><div><strong>الرقم:</strong> ${currentUser.id}</div><div><strong>النوع:</strong> ${isEmployee ? 'موظف' : 'عضو'}</div><div><strong>تاريخ التسجيل:</strong> ${currentUser.hiringDate||'-'}</div></div></div>
        <div style="text-align:center;"><div id="tempBarcode"></div><p>بطاقة رسمية</p></div>`;
        document.body.appendChild(cardDiv);
        const canvasBc = document.createElement('canvas');
        cardDiv.querySelector('#tempBarcode').appendChild(canvasBc);
        JsBarcode(canvasBc, currentUser.id, { format: "CODE128", width: 2 });
        if(asPng) {
            html2canvas(cardDiv, { scale: 3 }).then(canvas => { const link = document.createElement('a'); link.download = `card_${currentUser.id}.png`; link.href = canvas.toDataURL(); link.click(); document.body.removeChild(cardDiv); showToast('تم تحميل PNG', 'success'); });
        } else {
            html2pdf().set({ filename: `card_${currentUser.id}.pdf`, image: { type: 'png', quality: 0.98 }, html2canvas: { scale: 2 } }).from(cardDiv).save().then(() => { document.body.removeChild(cardDiv); showToast('تم تحميل PDF', 'success'); });
        }
    }
    
    // تسجيل الدخول والتهيئة
    window.performLogin = async function() {
        const id = document.getElementById('loginId').value.trim();
        const pwd = document.getElementById('loginPass').value.trim();
        if(!id || !pwd) { showToast('أدخل البيانات', 'error'); return; }
        if(membersList.length === 0 && !(await fetchMembers())) return;
        const member = membersList.find(m => m.id === id && m.password === pwd);
        if(member) {
            currentUser = { ...member };
            if(!currentUser.tasks) currentUser.tasks = currentUser.tasks || [];
            if(!currentUser.activityLog) currentUser.activityLog = currentUser.activityLog || [];
            if(!currentUser.activityData) currentUser.activityData = [3,5,2,8,4,6,7];
            localStorage.setItem('nazaha_dashboard_user', JSON.stringify(currentUser));
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboardContainer').style.display = 'block';
            renderProfileTab();
            await renderHomeTab();
            renderRecordsTab();
            showToast(`مرحباً ${currentUser.fullName}`, 'success');
        } else showToast('بيانات غير صحيحة', 'error');
    };
    
    function logout() { localStorage.removeItem('nazaha_dashboard_user'); currentUser=null; document.getElementById('loginContainer').style.display='flex'; document.getElementById('dashboardContainer').style.display='none'; showToast('تم الخروج', 'info'); }
    
    function closeModal() { document.getElementById('serviceModal').style.display = 'none'; }
    
    // ربط التبويبات والأحداث
    document.querySelectorAll('.tab-item').forEach(tab => tab.addEventListener('click', async () => {
        const target = tab.dataset.tab;
        document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
        document.getElementById(target+'Tab').classList.add('active');
        if(target === 'home') await renderHomeTab();
        else if(target === 'records') renderRecordsTab();
        else if(target === 'profile') renderProfileTab();
        else if(target === 'services') {
            const isEmployee = getUserType() === 'موظف';
            document.getElementById('employeeSpecificServices').style.display = isEmployee ? 'flex' : 'none';
        }
    }));
    document.getElementById('addRecordBtn')?.addEventListener('click', addNewRecord);
    document.getElementById('uploadCardImageBtn')?.addEventListener('click', () => { const inp=document.createElement('input'); inp.type='file'; inp.accept='image/png'; inp.onchange=e=>{ const f=e.target.files[0]; if(f){ const r=new FileReader(); r.onload=ev=>{ currentUser.profileImage=ev.target.result; localStorage.setItem('nazaha_dashboard_user',JSON.stringify(currentUser)); renderProfileTab(); showToast('تم تحديث الصورة','success'); }; r.readAsDataURL(f); } }; inp.click(); });
    document.getElementById('downloadCardBtn')?.addEventListener('click', () => downloadCard(false));
    document.getElementById('downloadCardPngBtn')?.addEventListener('click', () => downloadCard(true));
    window.addTaskFromHome = addNewRecord;
    
    window.addEventListener('load', async () => {
        document.getElementById('loadingScreen').classList.add('hide');
        const saved = localStorage.getItem('nazaha_dashboard_user');
        if(saved){
            currentUser = JSON.parse(saved);
            if(await fetchMembers()){
                const onlineUser = membersList.find(m => m.id === currentUser.id);
                if(onlineUser){ currentUser = {...onlineUser, profileImage: currentUser.profileImage, tasks: currentUser.tasks, activityLog: currentUser.activityLog}; renderProfileTab(); await renderHomeTab(); renderRecordsTab(); document.getElementById('loginContainer').style.display='none'; document.getElementById('dashboardContainer').style.display='block'; }
                else localStorage.removeItem('nazaha_dashboard_user');
            }
        }
    });
</script>
</body>
</html>
