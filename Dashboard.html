<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نزاهة 2026 - لوحة التحكم الإدارية</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: { primary: '#0f172a', secondary: '#1d4ed8', accent: '#f59e0b', dark: '#020617' }
                }
            }
        }
    </script>

    <!-- Libraries -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .toast-enter { transform: translateX(100%); opacity: 0; }
        .toast-enter-active { transform: translateX(0); opacity: 1; transition: all 0.3s ease; }
        .toast-exit { transform: translateX(100%); opacity: 0; transition: all 0.3s ease; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* A4 Professional Document Styling */
        .a4-preview { 
            width: 210mm; min-height: 297mm; background-color: white; 
            margin: 0 auto; box-shadow: 0 0 15px rgba(0,0,0,0.2); 
            position: relative; overflow: hidden; color: #1e293b;
        }
        .a4-bg { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; z-index: 0; opacity: 0.15; }
        .a4-content { position: relative; z-index: 10; padding: 25mm; height: 100%; display: flex; flex-direction: column; }
        
        #app-content { display: none; }
        #login-screen { display: flex; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #1d4ed8; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 h-screen flex overflow-hidden">

    <!-- Toasts Container (No Sound) -->
    <div id="toast-container" class="fixed top-5 right-5 z-[9999] flex flex-col gap-2"></div>

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 bg-primary z-[100] items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
            <div class="flex justify-center mb-4"><i data-lucide="shield-check" class="w-16 h-16 text-secondary"></i></div>
            <h1 class="text-3xl font-bold text-slate-800 mb-1">نزاهة 2026</h1>
            <p class="text-slate-500 mb-8 text-sm">المنتدى الشبابي للفكر والمشاركة المدنية</p>
            <form id="login-form" class="space-y-4">
                <input type="text" id="login-username" placeholder="اسم المستخدم" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-secondary outline-none dir-ltr" required>
                <input type="password" id="login-password" placeholder="كلمة المرور" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-secondary outline-none dir-ltr" required>
                <button type="submit" class="w-full bg-secondary text-white p-3 rounded-lg font-bold hover:bg-blue-800 transition flex justify-center items-center">
                    <span id="login-btn-text">تسجيل الدخول</span>
                    <div id="login-spinner" class="loader ml-2 hidden"></div>
                </button>
            </form>
        </div>
    </div>

    <!-- App Content -->
    <div id="app-content" class="w-full h-full flex flex-col md:flex-row">
        
        <!-- Sidebar -->
        <aside class="w-full md:w-64 bg-primary text-slate-300 flex flex-col transition-all duration-300 z-40 relative">
            <div class="p-5 flex items-center justify-between border-b border-slate-700/50 bg-dark">
                <h2 class="text-lg font-bold flex items-center gap-2 text-white"><i data-lucide="layout"></i> لوحة الإدارة</h2>
                <button class="md:hidden text-slate-400 hover:text-white" onclick="toggleSidebar()"><i data-lucide="x"></i></button>
            </div>
            <nav class="flex-1 overflow-y-auto py-4 space-y-1" id="sidebar-nav"></nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-full bg-slate-100 overflow-hidden relative">
            <!-- Header -->
            <header class="bg-white shadow-sm p-4 flex justify-between items-center z-30">
                <div class="flex items-center gap-4">
                    <button class="md:hidden text-slate-600" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
                    <h2 class="text-xl font-bold text-slate-800" id="page-title">الرئيسية</h2>
                </div>
                <div class="flex items-center gap-5">
                    <div class="hidden md:flex items-center gap-2 text-slate-500 text-sm font-semibold" id="live-clock">
                        <i data-lucide="clock" class="w-4 h-4"></i> <span>00:00</span>
                    </div>
                    <div class="relative cursor-pointer" onclick="switchTab('requests')">
                        <i data-lucide="bell" class="text-slate-600 hover:text-secondary transition"></i>
                        <span id="notif-badge" class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
                    </div>
                    <div class="flex items-center gap-3 border-r pr-4 border-slate-200">
                        <div class="bg-slate-200 p-1.5 rounded-full"><i data-lucide="user" class="text-slate-600 w-5 h-5"></i></div>
                        <span id="current-user-name" class="font-bold text-sm text-slate-700 hidden sm:block">مدير</span>
                        <button onclick="logout()" class="text-red-500 hover:text-red-700 mr-2" title="تسجيل خروج"><i data-lucide="log-out" class="w-5 h-5"></i></button>
                    </div>
                </div>
            </header>

            <!-- Dynamic Views Container -->
            <div class="flex-1 overflow-y-auto p-4 md:p-6" id="views-container"></div>
        </main>
    </div>

    <!-- Generic Modal for Forms & Details -->
    <div id="generic-modal" class="fixed inset-0 bg-slate-900/60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-4xl max-h-[95vh] flex flex-col">
            <div class="p-5 border-b flex justify-between items-center bg-slate-50 rounded-t-xl">
                <h3 id="modal-title" class="text-lg font-bold text-slate-800 flex items-center gap-2"></h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 transition"><i data-lucide="x"></i></button>
            </div>
            <div id="modal-body" class="p-6 overflow-y-auto flex-1 text-sm"></div>
            <div id="modal-footer" class="p-4 border-t flex gap-3 justify-end bg-slate-50 rounded-b-xl"></div>
        </div>
    </div>

    <!-- Scripts (Firebase & Application Logic) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyBWGPKwCiEDVu4Qe_REnZUGc0w6cmxG9Xk",
            authDomain: "nazaha-b1c97.firebaseapp.com",
            projectId: "nazaha-b1c97",
            storageBucket: "nazaha-b1c97.firebasestorage.app",
            messagingSenderId: "718233504902",
            appId: "1:718233504902:web:fa830f7f199d360be49507",
            measurementId: "G-S1WE1ES684"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        
        // --- EmailJS Init ---
        emailjs.init("POCtDAFV9CECAu9ow");

        // --- Global State ---
        window.appData = {
            currentUser: null, currentTab: 'dashboard', isInitialLoad: true,
            registrations: [], members: [], volunteers: [], content: [], attendance: [],
            finance: [], archive: [], users: [], messages: [], settings: {}
        };
        let unsubscribes = [];

        // --- Dictionary for Fields mapping (English to Arabic) ---
        const fieldLabels = {
            fullName: "الاسم واللقب", email: "البريد الإلكتروني", phone: "رقم الهاتف", birthDate: "تاريخ الميلاد",
            addressHay: "الحي / الشارع", addressWilaya: "الولاية", addressBaladia: "البلدية",
            motivation: "الدافع وراء التسجيل", socialLink: "رابط حساب التواصل الاجتماعي", educationLevel: "المستوى الدراسي",
            youthInstitution: "الانخراط في المؤسسات الشبانية", interestField: "المجال المهتم به", specialization: "التخصص الدقيق",
            paymentAbility: "القدرة على الدفع", paymentAmount: "مبلغ الدفع", inabilityReason: "سبب عدم القدرة",
            experience: "الخبرات والمهارات", volunteerMotivation: "الدافع وراء التطوع", cell: "الخلية", positionSelect: "المنصب",
            legalApproval: "الموافقة على الشروط", type: "نوع الطلب", date: "تاريخ التسجيل", status: "الحالة", title: "العنوان", body:"النص"
        };

        // --- Permissions ---
        const ROLES = {
            super_admin: 'مشرف عام', content_manager: 'مدير محتوى',
            hr_manager: 'مدير موارد بشرية', finance_manager: 'مدير مالي', viewer: 'مراقب'
        };

        window.checkRole = (allowedRoles) => {
            if (!appData.currentUser) return false;
            if (appData.currentUser.role === 'super_admin') return true;
            if (appData.currentUser.role === 'viewer') {
                showToast("غير مصرح لك بهذه العملية (وضع القراءة فقط).", "error"); return false;
            }
            if (!allowedRoles.includes(appData.currentUser.role)) {
                showToast("غير مصرح لك بهذه العملية.", "error"); return false;
            }
            return true;
        };

        // --- Utility Functions ---
        window.showToast = (msg, type = 'info') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = { success: 'bg-emerald-500', error: 'bg-red-500', info: 'bg-blue-500' };
            const icons = { success: 'check-circle', error: 'shield-alert', info: 'info' };
            toast.className = `${colors[type]} text-white px-4 py-3 rounded-lg shadow-xl flex items-center gap-3 toast-enter-active text-sm font-semibold min-w-[250px]`;
            toast.innerHTML = `<i data-lucide="${icons[type]}"></i> <span>${msg}</span>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.classList.add('toast-exit'); setTimeout(() => toast.remove(), 300); }, 3000);
        };

        window.generateID = (digits) => {
            let min = Math.pow(10, digits - 1);
            let max = Math.pow(10, digits) - 1;
            return Math.floor(min + Math.random() * (max - min + 1)).toString();
        };

        window.formatDate = (timestamp) => {
            if(!timestamp) return '-';
            const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return d.toLocaleDateString('ar-DZ') + ' ' + d.toLocaleTimeString('ar-DZ', {hour:'2-digit', minute:'2-digit'});
        };

        // --- Authentication ---
        async function setupDefaultAdmin() {
            const usersRef = collection(db, "users");
            const snapshot = await getDocs(query(usersRef, where("username", "==", "admin")));
            if (snapshot.empty) {
                await setDoc(doc(usersRef, "admin"), {
                    username: "admin", password: "nazaha2026", role: "super_admin", name: "المدير العام", created: serverTimestamp(), status: 'نشط'
                });
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('login-username').value.trim();
            const p = document.getElementById('login-password').value.trim();
            const btnText = document.getElementById('login-btn-text');
            const spinner = document.getElementById('login-spinner');
            
            btnText.classList.add('hidden'); spinner.classList.remove('hidden');
            
            try {
                await setupDefaultAdmin(); 
                const snap = await getDocs(query(collection(db, "users"), where("username", "==", u)));
                
                if (!snap.empty) {
                    const userData = snap.docs[0].data();
                    if (userData.password === p) {
                        if(userData.status === 'disabled') throw new Error("تم تعطيل هذا الحساب من قبل الإدارة.");
                        appData.currentUser = { id: snap.docs[0].id, ...userData };
                        await updateDoc(doc(db, "users", snap.docs[0].id), { lastLogin: serverTimestamp() });
                        
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('app-content').style.display = 'flex';
                        document.getElementById('current-user-name').innerText = userData.name;
                        
                        initApp();
                        showToast("مرحباً بك في لوحة الإدارة", "success");
                    } else throw new Error("كلمة المرور غير صحيحة");
                } else throw new Error("المستخدم غير موجود");
            } catch (err) { showToast(err.message, "error"); } 
            finally { btnText.classList.remove('hidden'); spinner.classList.add('hidden'); }
        });

        window.logout = () => {
            appData.currentUser = null;
            unsubscribes.forEach(unsub => unsub()); unsubscribes = [];
            document.getElementById('app-content').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('login-password').value = '';
        };

        // --- UI Initialization ---
        setInterval(() => {
            const clockEl = document.getElementById('live-clock');
            if(clockEl) clockEl.innerHTML = `<i data-lucide="clock" class="w-4 h-4"></i> <span>${new Date().toLocaleTimeString('ar-DZ')}</span>`;
        }, 1000);

        window.toggleSidebar = () => {
            const sidebar = document.querySelector('aside');
            sidebar.classList.toggle('hidden');
            sidebar.classList.toggle('absolute');
            sidebar.classList.toggle('h-full');
            sidebar.classList.toggle('w-64');
        };

        const tabs = [
            { id: 'dashboard', icon: 'layout-dashboard', title: 'لوحة الإحصائيات' },
            { id: 'requests', icon: 'inbox', title: 'مركز الطلبات' },
            { id: 'members', icon: 'users', title: 'إدارة المنخرطين' },
            { id: 'volunteers', icon: 'briefcase', title: 'الكادر الإداري (متطوعين)' },
            { id: 'content', icon: 'file-text', title: 'إدارة المحتوى' },
            { id: 'attendance', icon: 'clipboard-check', title: 'بوابة الحضور' },
            { id: 'finance', icon: 'coins', title: 'الضبط المالي' },
            { id: 'documents', icon: 'printer', title: 'الوثائق والأرشيف' },
            { id: 'messages', icon: 'message-square', title: 'المراسلات الداخلية' },
            { id: 'users', icon: 'shield', title: 'إدارة النظام والصلاحيات' },
            { id: 'settings', icon: 'settings', title: 'إعدادات المنتدى' }
        ];

        window.switchTab = (tabId) => {
            appData.currentTab = tabId;
            document.getElementById('page-title').innerText = tabs.find(t => t.id === tabId).title;
            
            document.querySelectorAll('#sidebar-nav a').forEach(a => {
                a.classList.remove('bg-slate-800', 'border-r-4', 'border-secondary', 'text-white');
                a.classList.add('text-slate-400');
                if(a.dataset.id === tabId) {
                    a.classList.remove('text-slate-400');
                    a.classList.add('bg-slate-800', 'border-r-4', 'border-secondary', 'text-white');
                }
            });
            renderCurrentView();
            lucide.createIcons();
        };

        function initApp() {
            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = tabs.map(tab => `
                <a href="#" data-id="${tab.id}" onclick="switchTab('${tab.id}')" class="flex items-center gap-3 px-6 py-3 hover:bg-slate-800 hover:text-white transition-all text-sm font-semibold text-slate-400">
                    <i data-lucide="${tab.icon}" class="w-5 h-5"></i> <span>${tab.title}</span>
                </a>
            `).join('');
            
            startListeners();
            switchTab('dashboard');
            setTimeout(()=> { appData.isInitialLoad = false; }, 3000);
        }

        function startListeners() {
            const collections = ['registrations', 'members', 'volunteers', 'articles', 'attendance', 'donations', 'expenses', 'archive', 'users', 'messages'];
            collections.forEach(colName => {
                const q = query(collection(db, colName));
                const unsub = onSnapshot(q, (snapshot) => {
                    // Check for new registrations to send email
                    if(colName === 'registrations' && !appData.isInitialLoad) {
                        snapshot.docChanges().forEach(change => {
                            if (change.type === "added") {
                                const req = change.doc.data();
                                emailjs.send("service_default", "template_default", {
                                    to_name: "مدير النظام",
                                    message: `تم استلام طلب ${req.type} جديد من ${req.fullName || 'شخص'}. يرجى مراجعة لوحة التحكم.`
                                }).catch(e=>console.log("Email error",e));
                            }
                        });
                    }
                    
                    appData[colName === 'articles' ? 'content' : colName] = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    updateNotifications();
                    if(getTabMapping(colName) === appData.currentTab || appData.currentTab === 'dashboard') renderCurrentView();
                });
                unsubscribes.push(unsub);
            });
            
            unsubscribes.push(onSnapshot(doc(db, "settings", "general"), (doc) => {
                if(doc.exists()) appData.settings = doc.data();
            }));
        }

        function getTabMapping(col) {
            const map = { registrations: 'requests', members: 'members', volunteers: 'volunteers', articles: 'content', attendance: 'attendance', donations: 'finance', expenses:'finance', archive: 'documents', users: 'users', messages: 'messages' };
            return map[col];
        }

        function updateNotifications() {
            const unread = appData.registrations.length; // Simple count of pending requests
            const badge = document.getElementById('notif-badge');
            if(unread > 0) { badge.innerText = unread > 99 ? '99+' : unread; badge.classList.remove('hidden'); }
            else badge.classList.add('hidden');
        }

        // --- View Router ---
        function renderCurrentView() {
            const container = document.getElementById('views-container');
            container.innerHTML = '';
            switch(appData.currentTab) {
                case 'dashboard': renderDashboard(container); break;
                case 'requests': renderRequests(container); break;
                case 'members': renderMembers(container); break;
                case 'volunteers': renderVolunteers(container); break;
                case 'content': renderContent(container); break;
                case 'attendance': renderAttendance(container); break;
                case 'finance': renderFinance(container); break;
                case 'documents': renderDocuments(container); break;
                case 'messages': renderMessages(container); break;
                case 'users': renderUsers(container); break;
                case 'settings': renderSettings(container); break;
            }
            lucide.createIcons();
        }

        // ==========================================
        // MODULES IMPLEMENTATION
        // ==========================================

        // 1. Dashboard
        function renderDashboard(container) {
            const totalMembers = appData.members.length;
            const totalVol = appData.volunteers.length;
            const balance = appData.donations.reduce((s,d)=>s+Number(d.amount),0) - appData.expenses.reduce((s,e)=>s+Number(e.amount),0);
            
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                    ${cardUI('المنخرطون', totalMembers, 'users', 'bg-blue-600')}
                    ${cardUI('الكادر (المتطوعون)', totalVol, 'briefcase', 'bg-emerald-600')}
                    ${cardUI('طلبات قيد الانتظار', appData.registrations.length, 'inbox', 'bg-amber-500')}
                    ${cardUI('الرصيد المالي', balance + ' د.ج', 'coins', 'bg-purple-600')}
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100"><canvas id="growthChart"></canvas></div>
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                        <h3 class="font-bold border-b pb-3 mb-3 text-slate-800 flex justify-between">أحدث الطلبات <button onclick="switchTab('requests')" class="text-xs text-secondary hover:underline">عرض الكل</button></h3>
                        <div class="space-y-2">
                            ${appData.registrations.slice(0, 5).map(r => `
                                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-lg border border-slate-100">
                                    <div class="flex flex-col">
                                        <span class="font-bold text-slate-700 text-sm">${r.fullName || r.title || 'طلب بدون اسم'}</span>
                                        <span class="text-[10px] text-slate-400">${formatDate(r.date || r.createdAt)}</span>
                                    </div>
                                    <span class="text-xs bg-slate-200 px-2 py-1 rounded font-bold text-slate-600">${r.type || 'مقال'}</span>
                                </div>
                            `).join('') || '<p class="text-slate-400 text-sm text-center py-4">لا توجد طلبات جديدة</p>'}
                        </div>
                    </div>
                </div>
            `;
            setTimeout(() => {
                new Chart(document.getElementById('growthChart'), {
                    type: 'bar',
                    data: { labels: ['إجمالي المنخرطين', 'إجمالي المتطوعين'], datasets: [{ label: 'العدد', data: [totalMembers, totalVol], backgroundColor: ['#2563eb', '#10b981'], borderRadius: 5 }] },
                    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
                });
            }, 100);
        }

        function cardUI(title, value, icon, color) {
            return `
                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between group hover:shadow-md transition">
                    <div><p class="text-slate-500 text-sm font-semibold mb-1">${title}</p><p class="text-3xl font-bold text-slate-800">${value}</p></div>
                    <div class="${color} text-white p-4 rounded-xl group-hover:scale-110 transition shadow-lg"><i data-lucide="${icon}" class="w-6 h-6"></i></div>
                </div>`;
        }

        // 2. Requests Center
        window.currentReqType = 'انخراط';
        function renderRequests(container) {
            const types = ['انخراط', 'تطوع', 'مشاركة', 'تواصل', 'مقال'];
            let filtered = [];

            try {
                if(action === 'accept') {
                    if(type === 'انخراط') {
                        const newId = generateID(8);
                        await setDoc(doc(db, "members", newId), { ...req, memberId: newId, status: 'نشط', joinDate: serverTimestamp() });
                        await deleteDoc(doc(db, "registrations", id));
                        showToast("تم قبول المنخرط برقم " + newId, "success");
                    } else if(type === 'تطوع') {
                        const newId = generateID(7);
                        // Confirmation of Cell/Position
                        const confirmCell = prompt("تأكيد الخلية الإدارية:", req.cell || "أمانة السر");
                        const confirmPos = prompt("تأكيد المنصب:", req.positionSelect || "عضو");
                        if(confirmCell && confirmPos) {

        window.generatePDF = async () => {
            if(!checkRole(['super_admin', 'hr_manager'])) return;
            const element = document.getElementById('a4-document');
            const pId = document.getElementById('doc-person').value;
            const type = document.getElementById('doc-type').value;
            const btn = document.getElementById('btn-print');
            
            if(!pId) return showToast("الرجاء اختيار المستهدف أولاً", "error");

            btn.disabled = true; btn.innerHTML = '<div class="loader mr-2"></div> جاري المعالجة...';
            showToast("جاري توليد المستند الاحترافي...", "info");
            
            try {
                // html2canvas to capture the styled div
                const canvas = await html2canvas(element, { scale: 3, useCORS: true, logging: false, backgroundColor: '#ffffff' });
                const imgData = canvas.toDataURL('image/jpeg', 0.95);
                
                // jsPDF to create A4 PDF
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);

                const person = appData.members.find(m=>m.memberId===pId) || appData.volunteers.find(v=>v.volId===pId);

                                <button onclick="deleteDocHandler('messages', '${m.id}')" class="absolute -top-3 -right-3 bg-red-100 text-red-500 p-1.5 rounded-full hidden group-hover:block hover:bg-red-200 border border-white shadow"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                            </div>
                        `).join('') || '<div class="text-center text-slate-400 mt-20 font-semibold flex flex-col items-center"><i data-lucide="inbox" class="w-12 h-12 mb-2 opacity-50"></i> لا توجد رسائل</div>'}
                    </div>
                </div>
            `;
        }

        window.sendInternalMsg = () => {
            const usersOpt = appData.users.filter(u=>u.id!==appData.currentUser.id).map(u=>`<option value="${u.id}">${u.name} (${ROLES[u.role]})</option>`).join('');
            document.getElementById('modal-title').innerHTML = `<i data-lucide="send" class="text-secondary"></i> إرسال رسالة داخلية`;
            document.getElementById('modal-body').innerHTML = `
                <select id="msg-to" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg mb-4"><option value="all">الجميع (إعلان عام)</option>${usersOpt}</select>
                <textarea id="msg-text" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg h-32 resize-none" placeholder="اكتب نص الرسالة هنا..." required></textarea>
            `;
            document.getElementById('modal-footer').innerHTML = `<button onclick="execSendMsg()" class="bg-secondary text-white px-6 py-2 rounded-lg font-bold">إرسال</button>`;
            document.getElementById('generic-modal').classList.remove('hidden');
            lucide.createIcons();
        };

        window.execSendMsg = async () => {
            const to = document.getElementById('msg-to').value;
            const text = document.getElementById('msg-text').value;
            if(!text) return;
            try {
                if(to === 'all') {
                    appData.users.forEach(async u => {
                        if(u.id !== appData.currentUser.id) await addDoc(collection(db, "messages"), { from: appData.currentUser.id, fromName: appData.currentUser.name, to: u.id, toName: u.name, text, date: serverTimestamp() });
                    });
                } else {
                    const toName = appData.users.find(u=>u.id===to).name;
                    await addDoc(collection(db, "messages"), { from: appData.currentUser.id, fromName: appData.currentUser.name, to, toName, text, date: serverTimestamp() });
                }
                closeModal(); showToast("تم إرسال الرسالة", "success");
                
                // Trigger EmailJS Notification for internal message
                emailjs.send("service_default", "template_default", { to_name: to==='all'?'الجميع':toName, message: `رسالة داخلية جديدة من ${appData.currentUser.name}: ${text}` });

            } catch(e) { showToast(e.message, "error"); }
        };

        // 10. Users
        function renderUsers(container) {
            container.innerHTML = `
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-5 h-full flex flex-col">
                    <div class="flex justify-between items-center mb-5 border-b pb-4">
                        <h3 class="font-bold text-slate-800">صلاحيات ومستخدمي لوحة التحكم</h3>
                        <button onclick="addUserModal()" class="bg-primary text-white px-5 py-2 rounded-lg text-sm font-bold flex items-center gap-2 hover:bg-slate-800"><i data-lucide="shield-plus" class="w-4 h-4"></i> إضافة مستخدم</button>
                    </div>
                    <div class="overflow-x-auto flex-1">
                        <table class="w-full text-sm text-right">
                            <thead class="bg-slate-50 text-slate-500"><tr><th class="p-3">الاسم</th><th class="p-3">اسم المستخدم (الدخول)</th><th class="p-3">الصلاحية</th><th class="p-3">الحالة</th><th class="p-3">آخر دخول</th><th class="p-3">الإجراءات</th></tr></thead>
                            <tbody>
                                ${appData.users.map(u=>`<tr class="border-b border-slate-50 hover:bg-slate-50">
                                    <td class="p-3 font-bold text-slate-800">${u.name}</td><td class="p-3 font-mono dir-ltr text-right text-secondary font-bold">${u.username}</td>
                                    <td class="p-3"><span class="bg-blue-50 text-blue-700 px-2 py-1 rounded text-xs font-bold border border-blue-200">${ROLES[u.role]||u.role}</span></td>
                                    <td class="p-3"><span class="px-2 py-1 rounded-md text-xs font-bold ${u.status==='disabled'?'bg-red-100 text-red-700':'bg-emerald-100 text-emerald-700'}">${u.status==='disabled'?'معطل':'نشط'}</span></td>
                                    <td class="p-3 text-xs text-slate-400">${formatDate(u.lastLogin)}</td>
                                    <td class="p-3 flex gap-2">
                                        ${u.username!=='admin' ? `
                                            <button onclick="toggleStatus('users','${u.id}','${u.status||'نشط'}')" class="text-amber-500 bg-amber-50 p-2 rounded hover:bg-amber-100" title="تعطيل/تنشيط"><i data-lucide="power" class="w-4 h-4"></i></button>
                                            <button onclick="deleteDocHandler('users','${u.id}')" class="text-red-500 bg-red-50 p-2 rounded hover:bg-red-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                        `:'<span class="text-xs text-slate-400">أساسي</span>'}
                                    </td>
                                </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        window.addUserModal = () => {
            if(!checkRole(['super_admin'])) return;
            document.getElementById('modal-title').innerHTML = `<i data-lucide="shield" class="text-primary"></i> مستخدم جديد للنظام`;
            document.getElementById('modal-body').innerHTML = `
                <form id="add-user-form" class="space-y-4">
                    <input type="text" id="u-name" placeholder="الاسم الكامل" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg" required>
                    <input type="text" id="u-user" placeholder="اسم المستخدم الدخول (بالأحرف اللاتينية)" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg dir-ltr font-mono" required>
                    <input type="text" id="u-pass" placeholder="كلمة المرور" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg dir-ltr font-mono" required>
                    <select id="u-role" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg font-bold">
                        ${Object.entries(ROLES).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
                    </select>
                </form>
            `;
            document.getElementById('modal-footer').innerHTML = `<button onclick="saveUser()" class="bg-primary text-white px-6 py-2 rounded-lg font-bold">إنشاء الحساب</button>`;
            document.getElementById('generic-modal').classList.remove('hidden');
            lucide.createIcons();
        };

        window.saveUser = async () => {
            const name = document.getElementById('u-name').value;
            const username = document.getElementById('u-user').value;
            const password = document.getElementById('u-pass').value;
            const role = document.getElementById('u-role').value;
            
            if(!name || !username || !password) return showToast("جميع الحقول مطلوبة", "error");
            if(appData.users.find(u=>u.username === username)) return showToast("اسم المستخدم هذا مستعمل من قبل", "error");

            try {
                await addDoc(collection(db, "users"), { name, username, password, role, status: 'نشط', created: serverTimestamp() });
                closeModal(); showToast("تم إنشاء الحساب الإداري بنجاح", "success");
            } catch(e) { showToast(e.message, "error"); }
        };

        // 11. Settings & Reset
        function renderSettings(container) {
            const set = appData.settings;
            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 space-y-5">
                        <h3 class="font-bold border-b pb-3 text-secondary flex items-center gap-2"><i data-lucide="palette"></i> هوية وجمالية المنتدى للوثائق</h3>
                        
                        <div><label class="text-xs font-bold text-slate-500 mb-1 block">اسم المنتدى الرسمي</label>
                        <input type="text" id="set-name" value="${set.forumName||'نزاهة 2026'}" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg font-bold text-slate-700"></div>
                        
                        <div class="border border-dashed border-slate-300 p-4 rounded-lg bg-slate-50">
                            <label class="text-xs font-bold text-slate-500 mb-2 block">الشعار الرئيسي (PNG شفاف)</label>
                            <input type="file" id="set-logo" accept="image/png, image/jpeg" class="w-full text-sm">
                            ${set.logo ? `<img src="${set.logo}" class="h-10 mt-2 object-contain bg-white p-1 rounded border">`:''}
                        </div>

                        <div class="border border-dashed border-slate-300 p-4 rounded-lg bg-slate-50">
                            <label class="text-xs font-bold text-slate-500 mb-2 block">الختم الدائري (PNG شفاف)</label>
                            <input type="file" id="set-stamp" accept="image/png" class="w-full text-sm">
                            ${set.stamp ? `<img src="${set.stamp}" class="h-10 mt-2 object-contain bg-white p-1 rounded border">`:''}
                        </div>

                        <div class="border border-dashed border-slate-300 p-4 rounded-lg bg-slate-50">
                            <label class="text-xs font-bold text-slate-500 mb-2 block">التوقيع الإلكتروني (PNG شفاف)</label>
                            <input type="file" id="set-sig" accept="image/png" class="w-full text-sm">
                            ${set.signature ? `<img src="${set.signature}" class="h-10 mt-2 object-contain bg-white p-1 rounded border">`:''}
                        </div>
                        
                        <div class="border border-dashed border-slate-300 p-4 rounded-lg bg-slate-50">
                            <label class="text-xs font-bold text-slate-500 mb-2 block">خلفية الوثائق (A4 تصميم احترافي)</label>
                            <input type="file" id="set-bg" accept="image/jpeg, image/png" class="w-full text-sm">
                            ${set.docBg ? `<p class="text-xs text-emerald-500 mt-1 font-bold">تم رفع خلفية مسبقاً</p>`:''}
                        </div>

                        <button onclick="saveSettings()" id="btn-saveset" class="bg-secondary text-white w-full py-3 rounded-lg font-bold shadow-lg hover:bg-blue-800 transition">حفظ التغييرات</button>
                    </div>

                    <div class="bg-red-50 rounded-xl shadow-sm border border-red-200 p-6 h-fit">
                        <h3 class="font-bold border-b border-red-200 pb-3 text-red-600 mb-4 flex items-center gap-2"><i data-lucide="alert-triangle"></i> منطقة الخطر وإعادة الضبط</h3>
                        <p class="text-sm text-red-800 font-semibold mb-6 leading-relaxed bg-red-100 p-4 rounded-lg border border-red-200">تصفير النظام يقوم بمسح جميع (المنخرطين، المتطوعين، الطلبات، الأنشطة، المالية، الحضور) بشكل نهائي وبدون تراجع. يتم الاحتفاظ فقط بـ (مستخدمي لوحة التحكم والأرشيف والإعدادات).</p>
                        <button onclick="resetSystem()" class="bg-red-600 text-white px-4 py-3 rounded-lg font-bold w-full hover:bg-red-700 shadow-lg flex justify-center items-center gap-2"><i data-lucide="rotate-ccw"></i> تأكيد عملية التصفير الكاملة</button>
                    </div>
                </div>
            `;
        }

        window.saveSettings = async () => {
            if(!checkRole(['super_admin'])) return;
            const name = document.getElementById('set-name').value;
            const btn = document.getElementById('btn-saveset');
            const updateObj = { forumName: name };
            
            btn.innerHTML = '<div class="loader mr-2 inline-block"></div> جاري الرفع...'; btn.disabled = true;
            
            const uploadToStorage = async (file, path) => {
                const storageRef = ref(storage, `settings/${path}_${Date.now()}`);
                const task = await uploadBytesResumable(storageRef, file);
                return await getDownloadURL(task.ref);
            };

            try {
                const logoF = document.getElementById('set-logo').files[0];
                const stampF = document.getElementById('set-stamp').files[0];
                const sigF = document.getElementById('set-sig').files[0];
                const bgF = document.getElementById('set-bg').files[0];
                
                if(logoF) updateObj.logo = await uploadToStorage(logoF, 'logo');
                if(stampF) updateObj.stamp = await uploadToStorage(stampF, 'stamp');
                if(sigF) updateObj.signature = await uploadToStorage(sigF, 'sig');
                if(bgF) updateObj.docBg = await uploadToStorage(bgF, 'bg');
                
                await setDoc(doc(db, "settings", "general"), updateObj, {merge:true});
                showToast("تم تحديث الهوية البصرية بنجاح", "success");
            } catch(e) { showToast(e.message, "error"); }
            finally { btn.innerHTML = 'حفظ التغييرات'; btn.disabled = false; renderCurrentView(); }
        };

        window.resetSystem = async () => {
            if(!checkRole(['super_admin'])) return;
            const pass = prompt("لتأكيد عملية التصفير الخطيرة، يرجى إدخال كلمة مرور المشرف العام:");
            if(pass !== appData.currentUser.password) return showToast("كلمة المرور غير صحيحة. تم إلغاء العملية.", "error");
            
            if(confirm("تحذير أخير: سيتم مسح قاعدة البيانات. هل أنت متأكد بنسبة 100%؟")) {
                showToast("جاري مسح البيانات، لا تغلق الصفحة...", "info");
                const colsToClear = ['members', 'volunteers', 'articles', 'attendance', 'donations', 'expenses', 'registrations'];
                try {
                    for(const c of colsToClear) {
                        const snap = await getDocs(collection(db, c));
                        for(const document of snap.docs) await deleteDoc(doc(db, c, document.id));
                    }
                    showToast("تمت عملية التصفير بنجاح", "success");
                    renderCurrentView();
                } catch(e) { showToast("حدث خطأ أثناء التصفير: " + e.message, "error"); }
            }
        };

        window.closeModal = () => document.getElementById('generic-modal').classList.add('hidden');
        document.getElementById('generic-modal').addEventListener('click', (e) => {
            if(e.target === document.getElementById('generic-modal')) closeModal();
        });

    </script>
</body>
</html>
